    // referencias DOM
    const contenedor = document.getElementById('contenedor');
    const buscador = document.getElementById('buscador');
    const darkBtn = document.getElementById('darkBtn');

    // ====== MODO OSCURO ======
    window.toggleDark = function() {
      document.body.classList.toggle('dark');
      if (document.body.classList.contains('dark')) {
        darkBtn.innerHTML = '☀️ Modo Claro';
        localStorage.setItem('modo-oscuro-caraqueno', 'dark');
      } else {
        darkBtn.innerHTML = '🌙 Modo Oscuro';
        localStorage.setItem('modo-oscuro-caraqueno', 'light');
      }
    };

    // persistencia
    if (localStorage.getItem('modo-oscuro-caraqueno') === 'dark') {
      document.body.classList.add('dark');
      darkBtn.innerHTML = '☀️ Modo Claro';
    }

    // ====== RENDER RECETAS ======
    function renderRecetas(lista) {
      contenedor.innerHTML = '';
      if (lista.length === 0) {
        contenedor.innerHTML = '<div class="no-results">😕 No encontramos ninguna receta</div>';
        return;
      }
      lista.forEach((receta, index) => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img src="${receta.imagen}" alt="${receta.titulo}" loading="lazy">
          <div class="card-content">
            <h3>${receta.titulo}</h3>
            <div class="meta">${receta.categoria} | ${receta.tiempo} | ${receta.dificultad}</div>
            <button onclick="toggleDetalle(${index})">📖 Ver Receta</button>
            <div class="detalle" id="detalle-${index}">
              <h4>Ingredientes</h4>
              <ul>${receta.ingredientes.map(i => `<li>${i}</li>`).join('')}</ul>
              <h4>Preparación</h4>
              <ol>${receta.preparacion.map(p => `<li>${p}</li>`).join('')}</ol>
              <p><strong>🧑‍🍳 Consejo:</strong> ${receta.consejo}</p>
            </div>
          </div>
        `;
        contenedor.appendChild(card);
      });
    }

    // Función global para mostrar/ocultar detalle (se llama desde onclick)
    window.toggleDetalle = function(id) {
      const detalle = document.getElementById('detalle-' + id);
      if (detalle) {
        detalle.style.display = detalle.style.display === 'block' ? 'none' : 'block';
      }
    };

    // Filtro por búsqueda
    function filtrar() {
      const texto = buscador.value.toLowerCase().trim();
      const filtradas = recetas.filter(r =>
        r.titulo.toLowerCase().includes(texto) ||
        (r.categoria && r.categoria.toLowerCase().includes(texto)) ||
        (r.ingredientes && r.ingredientes.join(' ').toLowerCase().includes(texto))
      );
      renderRecetas(filtradas);
    }

    buscador.addEventListener('keyup', filtrar);
    buscador.addEventListener('search', filtrar);

    // Render inicial (todas)
    renderRecetas(recetas);
  })();

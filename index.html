<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comida Venezolana · Vista desde un Caraqueño</title>
  <!-- Font Awesome 6 para iconos profesionales -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #fcf8f2;
      color: #1f2937;
      transition: background 0.25s, color 0.2s;
    }

    /* ===== MODO OSCURO ===== */
    body.dark {
      background: #121212;
      color: #f0e7db;
    }

    body.dark header {
      background: linear-gradient(145deg, #2b1c12, #341f13);
      border-bottom: 3px solid #b27a50;
    }

    body.dark .modo-boton {
      background: #3a2d24;
      color: #f3dac7;
      border: 1px solid #b28058;
    }

    body.dark .card {
      background: #1e1a17;
      border: 1px solid #5a4a3a;
      box-shadow: 0 20px 30px -12px #000000cc;
    }

    body.dark .card-categoria {
      background: #3f3229;
      color: #f0cfb2;
    }

    body.dark .btn-receta {
      background: #c3662c;
      color: #fff;
    }

    body.dark footer {
      background: #1d1712;
      border-top: 3px solid #b77949;
    }

    body.dark .no-resultados {
      background: #2b241e;
      border-color: #c5915f;
    }

    /* ===== HEADER PROFESIONAL ===== */
    header {
      background: linear-gradient(145deg, #8B1E1E, #b1422b);
      color: white;
      padding: 2.5rem 1.5rem;
      text-align: center;
      position: relative;
      box-shadow: 0 12px 28px -10px #6b2f1c;
      border-bottom: 5px solid #f5cca6;
    }

    .header-contenido {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      font-size: 3.5rem;
      font-weight: 800;
      letter-spacing: -1px;
      text-shadow: 4px 4px 0 #572917;
      line-height: 1.2;
    }

    .subtitulo {
      font-size: 1.3rem;
      opacity: 0.9;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-top: 8px;
    }

    .modo-boton {
      position: absolute;
      top: 1.8rem;
      right: 2.5rem;
      background: rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(12px);
      border: 2px solid white;
      color: white;
      padding: 0.8rem 2rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1.1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 12px;
      transition: 0.2s;
      box-shadow: 0 6px 16px #00000030;
    }

    .modo-boton:hover {
      background: rgba(255, 255, 255, 0.35);
      transform: scale(1.03);
    }

    /* BUSCADOR */
    .buscador-wrapper {
      margin-top: 2.5rem;
    }

    #buscador {
      width: 90%;
      max-width: 750px;
      padding: 1.3rem 2.2rem;
      border: none;
      border-radius: 80px;
      font-size: 1.2rem;
      background: white;
      box-shadow: 0 12px 28px #3b1c0d4d;
      border: 3px solid transparent;
      transition: 0.2s;
    }

    #buscador:focus {
      outline: none;
      border-color: #ffb882;
      background: #fffcf9;
    }

    body.dark #buscador {
      background: #2f251e;
      color: #f6e2d0;
      border-color: #7c614b;
    }

    /* ===== ESPACIOS PUBLICITARIOS ===== */
    .ad-container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 1.5rem;
    }

    .ad-space {
      background: linear-gradient(145deg, #f0e2d4, #e2cfbb);
      padding: 2rem;
      text-align: center;
      border-radius: 70px;
      border: 3px dashed #b27a50;
      color: #4b311b;
      font-weight: 700;
      font-size: 1.3rem;
      letter-spacing: 0.5px;
      box-shadow: inset 0 4px 12px #0000001a;
    }

    body.dark .ad-space {
      background: #2d251f;
      color: #ebcfb3;
      border-color: #bb8b62;
    }

    /* ===== GRID DE RECETAS (tarjetas con imagen placeholder real) ===== */
    .grid-recetas {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
      gap: 2.5rem;
      max-width: 1400px;
      margin: 0 auto;
      padding: 2rem 2rem 3.5rem;
    }

    .card {
      background: white;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 25px 40px -18px #994d2690;
      transition: all 0.35s cubic-bezier(0.2, 0.9, 0.3, 1);
      display: flex;
      flex-direction: column;
      border: 1px solid #fadbc6;
    }

    .card:hover {
      transform: translateY(-10px) scale(1.01);
      box-shadow: 0 40px 50px -18px #ab4d1e;
    }

    /* IMAGEN: aquí colocas tus fotos reales manualmente */
    .card-img {
      width: 100%;
      height: 230px;
      background-color: #e0c2a8;  /* color de respaldo mientras pones tu imagen */
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 1.2rem;
      font-size: 3.5rem;
      color: white;
      text-shadow: 2px 2px 6px black;
      border-bottom: 5px solid #b7622c;
      /* las imágenes se asignan inline con style, tú solo cambias el url */
    }

    .card-content {
      padding: 2rem 2rem 2.2rem;
      flex: 1;
    }

    .card-titulo {
      font-size: 2.1rem;
      font-weight: 700;
      color: #8B1E1E;
      margin-bottom: 0.3rem;
      line-height: 1.2;
    }

    body.dark .card-titulo {
      color: #f3ba86;
    }

    .card-categoria {
      display: inline-block;
      background: #fae3d1;
      padding: 0.4rem 1.5rem;
      border-radius: 50px;
      font-size: 0.95rem;
      font-weight: 600;
      color: #6b3f1f;
      margin: 0.8rem 0 1rem;
    }

    .card-meta {
      display: flex;
      gap: 1.8rem;
      margin-bottom: 1.2rem;
      color: #6b4f38;
      font-size: 1rem;
      font-weight: 500;
    }

    .card-meta i {
      color: #b85a24;
      width: 22px;
    }

    .btn-receta {
      background: #8B1E1E;
      color: white;
      border: none;
      padding: 1rem 2rem;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 8px 16px #8b1e1e80;
      margin-top: 0.8rem;
    }

    .btn-receta:hover {
      background: #ac3131;
      transform: scale(1.02);
    }

    .detalle {
      display: none;
      margin-top: 2rem;
      border-top: 3px dashed #d4a277;
      padding-top: 1.8rem;
    }

    .detalle h4 {
      color: #8B1E1E;
      font-size: 1.5rem;
      margin: 1.2rem 0 0.6rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    body.dark .detalle h4 {
      color: #f0b27a;
    }

    .detalle ul, .detalle ol {
      margin-left: 1.8rem;
      line-height: 1.9;
    }

    .consejo {
      background: #fff2e7;
      padding: 1.2rem 1.8rem;
      border-radius: 40px;
      margin-top: 1.5rem;
      border-left: 8px solid #b7622c;
      font-style: italic;
      font-size: 1.1rem;
    }

    body.dark .consejo {
      background: #2b241d;
      border-left-color: #ce8f5a;
    }

    /* Sin resultados */
    .no-resultados {
      grid-column: 1/-1;
      background: #fcefe3;
      border: 5px dashed #8B1E1E;
      border-radius: 90px;
      padding: 5rem 2rem;
      text-align: center;
      font-size: 2.2rem;
      color: #4e2e16;
    }

    footer {
      background: #241d17;
      color: #f4dfce;
      text-align: center;
      padding: 2.5rem;
      font-size: 1.2rem;
      border-top: 6px solid #b4622e;
      margin-top: 3rem;
    }

    /* Responsive */
    @media (max-width: 700px) {
      h1 { font-size: 2.5rem; }
      .modo-boton { top: 1rem; right: 1rem; padding: 0.5rem 1.2rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-contenido">
    <button class="modo-boton" id="darkBtn"><i class="fas fa-moon"></i> <span>Modo Oscuro</span></button>
    <h1>🇻🇪 Comida Venezolana</h1>
    <div class="subtitulo">
      <i class="fas fa-eye"></i> vista desde un caraqueño <i class="fas fa-utensils"></i>
    </div>
    <div class="buscador-wrapper">
      <input type="text" id="buscador" placeholder="🔍 Buscar receta, categoría o ingrediente...">
    </div>
  </div>
</header>

<!-- Espacio publicitario superior -->
<div class="ad-container">
  <div class="ad-space">
    <i class="fas fa-ad"></i>  ESPACIO GOOGLE ADSENSE / PUBLICIDAD  <i class="fas fa-ad"></i>
  </div>
</div>

<!-- Grid de recetas -->
<div class="grid-recetas" id="contenedor"></div>

<!-- Espacio publicitario inferior -->
<div class="ad-container">
  <div class="ad-space">
    <i class="fas fa-tag"></i>  ENLACES DE AFILIADO / PRODUCTOS RECOMENDADOS  <i class="fas fa-shopping-cart"></i>
  </div>
</div>

<footer>
  © 2026 Comida Venezolana Vista Desde un Caraqueño · Proyecto listo para monetización
</footer>

<script>
  (function() {
    // ---------- RECETAS CON CANTIDADES E IMÁGENES (tú reemplazarás las URL manualmente) ----------
    const recetas = [
      // Cada objeto incluye imagenUrl: coloca ahí la ruta de tu foto real.
      // Por defecto pongo un color sólido (data:image) para que se vea un bonito placeholder mientras.
      { 
        titulo: "Asado Negro Caraqueño", 
        categoria: "Carnes", 
        tiempo: "2h 30min", 
        porciones: "6", 
        dificultad: "Media",
        imagenUrl: "https://images.unsplash.com/photo-1544025162-d76694265947?w=600&auto=format", // foto real de carne (unsplash)
        ingredientes: ["1 kg muchacho redondo", "2 cdas azúcar", "1 cebolla grande", "3 dientes ajo", "1 taza vino tinto", "2 tazas caldo de res", "sal y pimienta"],
        preparacion: ["Sellar la carne en olla caliente.", "Caramelizar el azúcar hasta oscuro.", "Agregar cebolla, ajo y sofreír.", "Verter vino y caldo, cocinar tapado 2h.", "Dejar reposar y cortar en rebanadas."],
        consejo: "El caramelo debe quedar oscuro pero no quemado para evitar amargor."
      },
      { 
        titulo: "Pabellón Criollo", 
        categoria: "Plato Principal", 
        tiempo: "1h 15min", 
        porciones: "4", 
        dificultad: "Media",
        imagenUrl: "https://images.unsplash.com/photo-1598866592490-b8f1b5497f09?w=600&auto=format", // bandeja de comida
        ingredientes: ["400 g carne mechada", "2 tazas arroz blanco", "2 tazas caraotas negras", "2 plátanos maduros", "aceite"],
        preparacion: ["Preparar arroz blanco.", "Cocinar caraotas con aliños.", "Freír tajadas de plátano.", "Servir todos los componentes juntos."],
        consejo: "El equilibrio entre dulce (tajadas) y salado es la clave."
      },
      { 
        titulo: "Arepa Reina Pepiada", 
        categoria: "Arepas", 
        tiempo: "35min", 
        porciones: "4", 
        dificultad: "Fácil",
        imagenUrl: "https://images.unsplash.com/photo-1604329760661-e71dc83f8f26?w=600&auto=format", // arepa
        ingredientes: ["4 arepas asadas", "1 pechuga de pollo cocida", "1 aguacate", "3 cdas mayonesa", "sal"],
        preparacion: ["Desmechar el pollo finamente.", "Triturar aguacate y mezclar con pollo y mayonesa.", "Rellenar las arepas calientes."],
        consejo: "Servir inmediatamente para evitar oxidación del aguacate."
      },
      { 
        titulo: "Hallaca Tradicional", 
        categoria: "Navidad", 
        tiempo: "6h", 
        porciones: "25", 
        dificultad: "Alta",
        imagenUrl: "https://images.unsplash.com/photo-1627308595171-d1b5d6d7b9e1?w=600&auto=format", // tamal
        ingredientes: ["1 kg harina de maíz", "caldo de gallina", "500 g guiso de res/cerdo", "aceitunas", "alcaparras", "pasas", "hojas de plátano"],
        preparacion: ["Preparar masa con caldo.", "Cocinar guiso espeso.", "Armar hallacas con los ingredientes.", "Hervir 45 minutos."],
        consejo: "El toque dulce de las pasas debe equilibrar el salado."
      },
      { 
        titulo: "Tequenos", 
        categoria: "Pasapalos", 
        tiempo: "40min", 
        porciones: "20", 
        dificultad: "Media",
        imagenUrl: "https://images.unsplash.com/photo-1617839629672-6aee7644e534?w=600&auto=format", // tequeños
        ingredientes: ["250 g queso blanco firme", "1 paquete masa de trigo", "aceite para freír"],
        preparacion: ["Cortar queso en bastones.", "Envolver cada bastón con tiras de masa.", "Freír en aceite caliente hasta dorar."],
        consejo: "El aceite debe estar a 170°C para que no se abran."
      },
      { 
        titulo: "Quesillo Venezolano", 
        categoria: "Postres", 
        tiempo: "1h", 
        porciones: "8", 
        dificultad: "Media",
        imagenUrl: "https://images.unsplash.com/photo-1615971797736-623f5d49c77d?w=600&auto=format", // flan
        ingredientes: ["1 lata leche condensada", "1 taza leche líquida", "4 huevos", "1 taza azúcar (para caramelo)"],
        preparacion: ["Preparar caramelo con azúcar.", "Licuar leches con huevos.", "Verter en molde caramelizado y hornear a baño María."],
        consejo: "Reposar en nevera mínimo 4 horas antes de desmoldar."
      },
      { 
        titulo: "Sancocho de Gallina", 
        categoria: "Sopas", 
        tiempo: "2h 15min", 
        porciones: "6", 
        dificultad: "Media",
        imagenUrl: "https://images.unsplash.com/photo-1547928576-822741b9f8b2?w=600&auto=format", // sopa
        ingredientes: ["1 gallina troceada", "2 yucas", "2 plátanos verdes", "2 mazorcas", "cilantro"],
        preparacion: ["Hervir gallina con agua y sal.", "Agregar vegetales en orden.", "Servir con cilantro fresco."],
        consejo: "Espumar durante cocción para caldo claro."
      },
      { 
        titulo: "Cachapa de Maíz", 
        categoria: "Desayunos", 
        tiempo: "25min", 
        porciones: "4", 
        dificultad: "Fácil",
        imagenUrl: "https://images.unsplash.com/photo-1618304283054-eb6553e76dbd?w=600&auto=format", // cachapa
        ingredientes: ["2 tazas maíz tierno molido", "1 cda azúcar", "pizca de sal", "queso de mano"],
        preparacion: ["Licuar maíz con azúcar y sal.", "Cocinar en budare y rellenar con queso."],
        consejo: "No hacerla muy delgada para que quede suave."
      }
    ];

    // Para tener más recetas visualmente, duplicamos algunas (tú luego agregas más)
    const recetasExtendidas = [...recetas];
    // Añadir algunas repeticiones con títulos diferentes para llenar grid
    recetasExtendidas.push({ 
      titulo: "Golfeados", categoria: "Panadería", tiempo: "2h", porciones: "12", dificultad: "Media",
      imagenUrl: "https://images.unsplash.com/photo-1588195538326-c5b1e9f80a1b?w=600&auto=format",
      ingredientes: ["500 g harina", "10 g levadura", "150 g papelón", "100 g queso blanco"],
      preparacion: ["Amasar y fermentar.", "Rellenar con papelón.", "Hornear y cubrir con queso."],
      consejo: "Servir tibios, recién horneados."
    });
    recetasExtendidas.push({ 
      titulo: "Chicha Criolla", categoria: "Bebidas", tiempo: "30min", porciones: "6", dificultad: "Fácil",
      imagenUrl: "https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=600&auto=format",
      ingredientes: ["1 taza arroz", "1 litro leche", "azúcar al gusto", "canela"],
      preparacion: ["Cocinar arroz con agua y canela.", "Licuar con leche.", "Servir frío espolvoreado con canela."],
      consejo: "Reposar en nevera potencia el sabor."
    });

    // Referencias DOM
    const contenedor = document.getElementById('contenedor');
    const buscador = document.getElementById('buscador');
    const darkBtn = document.getElementById('darkBtn');

    // ---------- MODO OSCURO ----------
    function toggleDark() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('modo-oscuro-caraqueno', isDark ? 'dark' : 'light');
      darkBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i> Modo Claro' : '<i class="fas fa-moon"></i> Modo Oscuro';
    }
    darkBtn.addEventListener('click', toggleDark);

    // Comprobar localStorage
    if (localStorage.getItem('modo-oscuro-caraqueno') === 'dark') {
      document.body.classList.add('dark');
      darkBtn.innerHTML = '<i class="fas fa-sun"></i> Modo Claro';
    }

    // ---------- RENDER TARJETAS ----------
    function renderRecetas(lista) {
      contenedor.innerHTML = '';
      if (lista.length === 0) {
        contenedor.innerHTML = '<div class="no-resultados"><i class="fas fa-search"></i>  No hay recetas con esos términos</div>';
        return;
      }
      lista.forEach((receta, idx) => {
        const card = document.createElement('div');
        card.className = 'card';

        // Imagen: tú puedes reemplazar la URL manualmente en el array. 
        // Si la url está vacía o no carga, se verá el color de fondo.
        const estiloImagen = `background-image: url('${receta.imagenUrl}'); background-color: #c9a885;`; // fallback color

        card.innerHTML = `
          <div class="card-img" style="${estiloImagen} background-size: cover; background-position: center;">
            <!-- pequeño emoji decorativo, opcional -->
            <span style="font-size:2.5rem; opacity:0.9;">🍽️</span>
          </div>
          <div class="card-content">
            <h2 class="card-titulo">${receta.titulo}</h2>
            <div class="card-categoria"><i class="fas fa-tag"></i> ${receta.categoria}</div>
            <div class="card-meta">
              <span><i class="far fa-clock"></i> ${receta.tiempo}</span>
              <span><i class="fas fa-chart-line"></i> ${receta.dificultad}</span>
              <span><i class="fas fa-users"></i> ${receta.porciones} porc</span>
            </div>
            <button class="btn-receta" onclick="toggleDetalle(${idx})"><i class="fas fa-book-open"></i> Ver receta</button>
            <div class="detalle" id="detalle-${idx}">
              <h4><i class="fas fa-shopping-basket"></i> Ingredientes (cantidades)</h4>
              <ul>${receta.ingredientes.map(i => `<li>${i}</li>`).join('')}</ul>
              <h4><i class="fas fa-utensils"></i> Preparación</h4>
              <ol>${receta.preparacion.map(p => `<li>${p}</li>`).join('')}</ol>
              <div class="consejo"><i class="fas fa-lightbulb"></i> ${receta.consejo}</div>
            </div>
          </div>
        `;
        contenedor.appendChild(card);
      });
    }

    // Función global toggle detalle
    window.toggleDetalle = function(id) {
      const detalle = document.getElementById('detalle-' + id);
      if (detalle) {
        detalle.style.display = detalle.style.display === 'block' ? 'none' : 'block';
      }
    };

    // Filtro
    function filtrar() {
      const texto = buscador.value.toLowerCase().trim();
      const filtradas = recetasExtendidas.filter(r =>
        r.titulo.toLowerCase().includes(texto) ||
        r.categoria.toLowerCase().includes(texto) ||
        r.ingredientes.some(i => i.toLowerCase().includes(texto))
      );
      renderRecetas(filtradas);
    }
    buscador.addEventListener('keyup', filtrar);
    buscador.addEventListener('search', filtrar);

    // Render inicial
    renderRecetas(recetasExtendidas);
  })();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Fichas de Clientes · Ventas con Ticker y Estado de Pago</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c15;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 1.5rem;
      color: #eef2ff;
    }

    .app-container {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 1rem;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      background: linear-gradient(135deg, #c084fc, #60a5fa);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn {
      background: #1e293b;
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      color: #e2e8f0;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
    }
    .btn-primary:hover { background: #2563eb; transform: translateY(-1px); }

    .btn-success {
      background: #16a34a;
    }
    .btn-success:hover { background: #15803d; }

    .btn-outline {
      border: 1px solid #334155;
      background: transparent;
    }
    .btn-outline:hover { background: #1e293b; }

    .btn-sm {
      padding: 5px 12px;
      font-size: 0.75rem;
    }

    /* dos columnas: lista de clientes + ficha */
    .dashboard {
      display: flex;
      gap: 1.8rem;
      flex-wrap: wrap;
    }

    .clientes-sidebar {
      flex: 1.2;
      min-width: 260px;
      background: #0f172a;
      border-radius: 28px;
      padding: 1.2rem;
      border: 1px solid #1e293b;
      height: fit-content;
    }

    .clientes-sidebar h2 {
      font-size: 1.3rem;
      margin-bottom: 1rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .cliente-card {
      background: #111827;
      border-radius: 20px;
      padding: 12px 16px;
      margin-bottom: 10px;
      cursor: pointer;
      transition: 0.1s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 1px solid #1f2a3e;
    }
    .cliente-card:hover { background: #1e293b; transform: scale(0.99); }
    .cliente-card.active {
      background: #1e2a3e;
      border-left: 4px solid #3b82f6;
    }
    .cliente-nombre-side {
      font-weight: 600;
    }
    .delete-cliente {
      background: none;
      border: none;
      color: #f87171;
      cursor: pointer;
      font-size: 1.1rem;
    }

    /* ficha del cliente */
    .ficha-container {
      flex: 3;
      min-width: 320px;
      background: #0f172a;
      border-radius: 28px;
      border: 1px solid #1e293b;
      padding: 1.5rem;
    }

    .ficha-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
      border-bottom: 1px solid #334155;
      padding-bottom: 1rem;
    }
    .ficha-titulo {
      font-size: 1.8rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .editar-cliente-input {
      background: #1e293b;
      border: 1px solid #3b82f6;
      padding: 6px 12px;
      border-radius: 30px;
      color: white;
      font-size: 1.2rem;
      font-weight: bold;
    }

    /* compras */
    .compra-item {
      background: #111827;
      border-radius: 24px;
      padding: 1rem;
      margin-bottom: 1.2rem;
      border-left: 4px solid #3b82f6;
    }
    .compra-header {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }
    .compra-fecha {
      font-weight: 600;
      color: #94a3b8;
    }
    .estado-badge {
      padding: 4px 12px;
      border-radius: 40px;
      font-size: 0.7rem;
      font-weight: bold;
    }
    .pagado { background: #15803d; color: white; }
    .debe { background: #b91c1c; color: white; }
    .productos-lista {
      margin: 12px 0;
      padding-left: 12px;
    }
    .producto-row {
      display: flex;
      justify-content: space-between;
      padding: 5px 0;
      border-bottom: 1px dashed #2d3a4e;
    }
    .total-compra {
      text-align: right;
      font-weight: 700;
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid #2d3a4e;
    }
    .acciones-compra {
      display: flex;
      gap: 12px;
      margin-top: 14px;
      flex-wrap: wrap;
    }

    /* formulario nueva compra */
    .nueva-compra {
      background: #1a2538;
      border-radius: 24px;
      padding: 1rem;
      margin-top: 1.5rem;
    }
    .producto-input-group {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 8px;
      align-items: center;
    }
    .producto-input-group input {
      background: #0f172a;
      border: 1px solid #334155;
      padding: 8px 12px;
      border-radius: 20px;
      color: white;
      flex: 1;
    }
    .agregar-producto-btn {
      background: #3b82f6;
      border: none;
      padding: 6px 12px;
      border-radius: 30px;
      cursor: pointer;
      color: white;
    }

    /* modal ticket */
    .modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }
    .modal-content {
      background: #0f172a;
      border-radius: 32px;
      padding: 1.8rem;
      max-width: 500px;
      width: 90%;
      border: 1px solid #3b82f6;
    }
    .ticket-text {
      background: #111827;
      padding: 1rem;
      border-radius: 20px;
      font-family: monospace;
      white-space: pre-wrap;
      margin: 1rem 0;
      max-height: 400px;
      overflow: auto;
    }
    @media (max-width: 800px) {
      .dashboard { flex-direction: column; }
    }
  </style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <h1>📋 Fichas de Clientes · Ventas + Ticker</h1>
    <button class="btn btn-primary" id="nuevoClienteGlobalBtn">➕ Nuevo Cliente</button>
  </div>

  <div class="dashboard">
    <!-- Lista de clientes -->
    <div class="clientes-sidebar">
      <h2>👥 Clientes</h2>
      <div id="listaClientes"></div>
    </div>

    <!-- Ficha activa -->
    <div class="ficha-container" id="fichaContainer">
      <div class="ficha-header">
        <div class="ficha-titulo">
          <span>📄</span>
          <span id="clienteNombreDisplay">Selecciona un cliente</span>
        </div>
        <div>
          <button class="btn btn-outline btn-sm" id="editarClienteBtn" style="display: none;">✏️ Editar</button>
        </div>
      </div>
      <div id="fichaContenido">
        <div style="text-align: center; padding: 3rem;">👈 Haz clic en un cliente para ver su ficha</div>
      </div>
    </div>
  </div>
</div>

<!-- Modal ticket -->
<div id="ticketModal" class="modal">
  <div class="modal-content">
    <h3>🧾 Ticker de compra</h3>
    <div id="ticketTexto" class="ticket-text"></div>
    <div style="display: flex; gap: 12px; justify-content: flex-end;">
      <button class="btn btn-outline" id="copiarTicketBtn">📋 Copiar</button>
      <button class="btn btn-success" id="enviarWhatsappBtn">📲 Enviar por WhatsApp</button>
      <button class="btn" id="cerrarModalBtn">Cerrar</button>
    </div>
  </div>
</div>

<script>
  // ---------- ESTRUCTURA DE DATOS ----------
  let clientes = [];      // { id, nombre }
  let compras = [];       // { id, clienteId, fecha (ISO date string YYYY-MM-DD), items: [{producto, cantidad, precio}], estado, fechaPago (opcional) }
  let nextClienteId = 1;
  let nextCompraId = 1;

  // Cargar o inicializar demo
  function loadData() {
    const storedClientes = localStorage.getItem('clientesFichas');
    const storedCompras = localStorage.getItem('comprasFichas');
    if (storedClientes && storedCompras) {
      clientes = JSON.parse(storedClientes);
      compras = JSON.parse(storedCompras);
      nextClienteId = Math.max(0, ...clientes.map(c => c.id), 0) + 1;
      nextCompraId = Math.max(0, ...compras.map(c => c.id), 0) + 1;
    } else {
      // demo basado en clientes anteriores
      const names = ["Pancho", "Vicente", "Ariel", "Matis", "Lían", "Magno", "Brian", "Pipe", "Rominous", "Niko", "Rodrigo"];
      clientes = names.map((n, idx) => ({ id: idx + 1, nombre: n }));
      nextClienteId = clientes.length + 1;
      const hoy = new Date().toISOString().slice(0,10);
      const ayer = new Date(Date.now() - 86400000).toISOString().slice(0,10);
      compras = [
        { id: 1, clienteId: 1, fecha: hoy, items: [{producto:"Galletas", cantidad:1, precio:1200}], estado:"Debe", fechaPago: null },
        { id: 2, clienteId: 2, fecha: hoy, items: [{producto:"Galletas", cantidad:1, precio:1200}], estado:"Debe", fechaPago: null },
        { id: 3, clienteId: 3, fecha: hoy, items: [{producto:"Galletas", cantidad:2, precio:1200}], estado:"Debe", fechaPago: null },
        { id: 4, clienteId: 4, fecha: ayer, items: [{producto:"Bonobon grande", cantidad:1, precio:2500}], estado:"Pagado", fechaPago: ayer },
        { id: 5, clienteId: 5, fecha: hoy, items: [{producto:"Llavero", cantidad:1, precio:800}], estado:"Debe", fechaPago: null },
        { id: 6, clienteId: 11, fecha: hoy, items: [{producto:"Llavero", cantidad:1, precio:800}], estado:"Debe", fechaPago: null },
        { id: 7, clienteId: 3, fecha: ayer, items: [{producto:"Bonobon", cantidad:3, precio:1800}], estado:"Pagado", fechaPago: ayer },
      ];
      nextCompraId = compras.length + 1;
    }
    guardarDatos();
  }

  function guardarDatos() {
    localStorage.setItem('clientesFichas', JSON.stringify(clientes));
    localStorage.setItem('comprasFichas', JSON.stringify(compras));
  }

  // UI: renderizar lista de clientes
  let clienteActivoId = null;

  function renderListaClientes() {
    const container = document.getElementById('listaClientes');
    container.innerHTML = '';
    clientes.forEach(cli => {
      const div = document.createElement('div');
      div.className = `cliente-card ${clienteActivoId === cli.id ? 'active' : ''}`;
      div.innerHTML = `
        <span class="cliente-nombre-side">${escapeHtml(cli.nombre)}</span>
        <button class="delete-cliente" data-id="${cli.id}">🗑️</button>
      `;
      div.addEventListener('click', (e) => {
        if (e.target.classList.contains('delete-cliente')) return;
        seleccionarCliente(cli.id);
      });
      const deleteBtn = div.querySelector('.delete-cliente');
      deleteBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        if (confirm(`¿Eliminar cliente "${cli.nombre}" y todas sus compras?`)) {
          clientes = clientes.filter(c => c.id !== cli.id);
          compras = compras.filter(c => c.clienteId !== cli.id);
          if (clienteActivoId === cli.id) {
            clienteActivoId = null;
            document.getElementById('clienteNombreDisplay').innerText = 'Selecciona un cliente';
            document.getElementById('fichaContenido').innerHTML = '<div style="text-align:center;padding:3rem;">👈 Selecciona un cliente</div>';
          }
          guardarDatos();
          renderListaClientes();
          if (clienteActivoId) renderFichaCliente(clienteActivoId);
        }
      });
      container.appendChild(div);
    });
  }

  function seleccionarCliente(id) {
    clienteActivoId = id;
    renderListaClientes();
    renderFichaCliente(id);
  }

  function renderFichaCliente(clienteId) {
    const cliente = clientes.find(c => c.id === clienteId);
    if (!cliente) return;
    document.getElementById('clienteNombreDisplay').innerHTML = `${escapeHtml(cliente.nombre)} <span style="font-size:0.8rem;">🆔 #${cliente.id}</span>`;
    const container = document.getElementById('fichaContenido');
    
    // filtrar compras del cliente ordenadas por fecha descendente
    let comprasCliente = compras.filter(c => c.clienteId === clienteId).sort((a,b) => new Date(b.fecha) - new Date(a.fecha));
    
    let html = `<div style="margin-bottom: 20px;"><button class="btn btn-primary btn-sm" id="btnAgregarCompra">➕ Agregar compra</button></div>`;
    
    if (comprasCliente.length === 0) html += `<div style="text-align:center;padding:2rem;">✨ No hay compras registradas</div>`;
    else {
      comprasCliente.forEach(comp => {
        const total = comp.items.reduce((sum, item) => sum + (item.cantidad * item.precio), 0);
        const estadoClass = comp.estado === 'Pagado' ? 'pagado' : 'debe';
        const estadoTexto = comp.estado === 'Pagado' ? '✅ PAGADO' : '⏳ DEBE';
        html += `
          <div class="compra-item" data-compra-id="${comp.id}">
            <div class="compra-header">
              <span class="compra-fecha">📅 ${comp.fecha}</span>
              <span class="estado-badge ${estadoClass}">${estadoTexto}</span>
            </div>
            <div class="productos-lista">
              ${comp.items.map(item => `<div class="producto-row"><span>${escapeHtml(item.producto)} x${item.cantidad}</span><span>$${item.precio} c/u → $${(item.cantidad * item.precio).toFixed(2)}</span></div>`).join('')}
            </div>
            <div class="total-compra">💰 TOTAL: $${total.toFixed(2)}</div>
            <div class="acciones-compra">
              ${comp.estado === 'Debe' ? `<button class="btn btn-success btn-sm marcar-pagado" data-id="${comp.id}">💵 Marcar como Pagado</button>` : `<button class="btn btn-outline btn-sm desmarcar-pagado" data-id="${comp.id}">🔄 Volver a Debe</button>`}
              <button class="btn btn-outline btn-sm ver-ticket" data-id="${comp.id}">🧾 Ver Ticket</button>
              <button class="btn delete-compra btn-sm" data-id="${comp.id}">🗑️ Eliminar</button>
            </div>
          </div>
        `;
      });
    }
    
    // Formulario nueva compra (inicialmente oculto)
    html += `<div id="formNuevaCompra" style="display:none;" class="nueva-compra">
              <h4>📝 Nueva compra</h4>
              <label>📅 Fecha: <input type="date" id="fechaCompra" value="${new Date().toISOString().slice(0,10)}" style="background:#1e293b; border-radius:20px; padding:6px; color:white;"></label>
              <div id="itemsContainer" style="margin:12px 0;"></div>
              <button class="btn btn-sm" id="agregarItemBtn">➕ Añadir producto</button>
              <div style="margin-top:15px;">
                <button class="btn btn-primary" id="guardarCompraBtn">💾 Guardar compra</button>
                <button class="btn btn-outline" id="cancelarCompraBtn">Cancelar</button>
              </div>
            </div>`;
    
    container.innerHTML = html;
    
    // Eventos dinámicos
    document.getElementById('btnAgregarCompra')?.addEventListener('click', () => {
      const form = document.getElementById('formNuevaCompra');
      if (form) form.style.display = 'block';
      inicializarItemsVacios();
    });
    document.getElementById('cancelarCompraBtn')?.addEventListener('click', () => {
      document.getElementById('formNuevaCompra').style.display = 'none';
    });
    
    // botones de acciones de compras existentes
    document.querySelectorAll('.marcar-pagado').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.dataset.id);
        marcarPagoCompra(id, true);
      });
    });
    document.querySelectorAll('.desmarcar-pagado').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.dataset.id);
        marcarPagoCompra(id, false);
      });
    });
    document.querySelectorAll('.delete-compra').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.dataset.id);
        if (confirm('¿Eliminar esta compra?')) {
          compras = compras.filter(c => c.id !== id);
          guardarDatos();
          renderFichaCliente(clienteId);
        }
      });
    });
    document.querySelectorAll('.ver-ticket').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const id = parseInt(btn.dataset.id);
        mostrarTicket(id);
      });
    });
    
    // guardar nueva compra
    document.getElementById('guardarCompraBtn')?.addEventListener('click', () => {
      const fecha = document.getElementById('fechaCompra').value;
      if (!fecha) return alert('Selecciona fecha');
      const items = [];
      const rows = document.querySelectorAll('.item-row');
      rows.forEach(row => {
        const producto = row.querySelector('.prod-nombre')?.value.trim();
        const cantidad = parseInt(row.querySelector('.prod-cantidad')?.value);
        const precio = parseFloat(row.querySelector('.prod-precio')?.value);
        if (producto && cantidad > 0 && !isNaN(precio)) {
          items.push({ producto, cantidad, precio });
        }
      });
      if (items.length === 0) return alert('Agrega al menos un producto válido');
      const nuevaCompra = {
        id: nextCompraId++,
        clienteId: cliente.id,
        fecha: fecha,
        items: items,
        estado: 'Debe',
        fechaPago: null
      };
      compras.push(nuevaCompra);
      guardarDatos();
      document.getElementById('formNuevaCompra').style.display = 'none';
      renderFichaCliente(clienteId);
    });
  }
  
  function inicializarItemsVacios() {
    const container = document.getElementById('itemsContainer');
    container.innerHTML = '';
    agregarFilaItem();
    document.getElementById('agregarItemBtn')?.addEventListener('click', () => agregarFilaItem());
  }
  
  function agregarFilaItem() {
    const container = document.getElementById('itemsContainer');
    const div = document.createElement('div');
    div.className = 'item-row';
    div.style.display = 'flex';
    div.style.gap = '8px';
    div.style.marginBottom = '8px';
    div.style.flexWrap = 'wrap';
    div.innerHTML = `
      <input type="text" placeholder="Producto" class="prod-nombre" style="flex:2; background:#0f172a; border-radius:20px; padding:8px;">
      <input type="number" placeholder="Cantidad" class="prod-cantidad" value="1" style="flex:1; background:#0f172a; border-radius:20px; padding:8px;">
      <input type="number" placeholder="Precio" class="prod-precio" value="0" step="any" style="flex:1; background:#0f172a; border-radius:20px; padding:8px;">
      <button class="btn-outline btn-sm eliminar-item" style="padding:4px 10px;">🗑️</button>
    `;
    div.querySelector('.eliminar-item')?.addEventListener('click', () => div.remove());
    container.appendChild(div);
  }
  
  function marcarPagoCompra(compraId, pagado) {
    const compra = compras.find(c => c.id === compraId);
    if (compra) {
      compra.estado = pagado ? 'Pagado' : 'Debe';
      compra.fechaPago = pagado ? new Date().toISOString().slice(0,10) : null;
      guardarDatos();
      if (clienteActivoId) renderFichaCliente(clienteActivoId);
    }
  }
  
  function mostrarTicket(compraId) {
    const compra = compras.find(c => c.id === compraId);
    if (!compra) return;
    const cliente = clientes.find(c => c.id === compra.clienteId);
    const total = compra.items.reduce((s, i) => s + (i.cantidad * i.precio), 0);
    let lineas = `🧾 TICKET DE COMPRA\n`;
    lineas += `Cliente: ${cliente.nombre}\n`;
    lineas += `Fecha: ${compra.fecha}\n`;
    lineas += `Estado: ${compra.estado === 'Pagado' ? '✅ PAGADO' : '⏳ PENDIENTE DE PAGO'}\n`;
    if (compra.fechaPago) lineas += `Fecha de pago: ${compra.fechaPago}\n`;
    lineas += `--------------------------------\n`;
    compra.items.forEach(item => {
      lineas += `${item.producto}  x${item.cantidad}   $${item.precio} c/u → $${(item.cantidad*item.precio).toFixed(2)}\n`;
    });
    lineas += `--------------------------------\n`;
    lineas += `💰 TOTAL: $${total.toFixed(2)}\n`;
    lineas += `¡Gracias por su compra!`;
    
    const modal = document.getElementById('ticketModal');
    const textoDiv = document.getElementById('ticketTexto');
    textoDiv.innerText = lineas;
    modal.style.display = 'flex';
    
    // guardar compra actual para whatsapp
    window.currentTicketText = lineas;
  }
  
  // Eventos del modal
  document.getElementById('copiarTicketBtn')?.addEventListener('click', () => {
    const texto = document.getElementById('ticketTexto').innerText;
    navigator.clipboard.writeText(texto);
    alert('Ticket copiado al portapapeles');
  });
  document.getElementById('enviarWhatsappBtn')?.addEventListener('click', () => {
    const texto = encodeURIComponent(window.currentTicketText || '');
    window.open(`https://wa.me/?text=${texto}`, '_blank');
  });
  document.getElementById('cerrarModalBtn')?.addEventListener('click', () => {
    document.getElementById('ticketModal').style.display = 'none';
  });
  
  // Nuevo cliente global
  document.getElementById('nuevoClienteGlobalBtn')?.addEventListener('click', () => {
    const nombre = prompt('Nombre del nuevo cliente:');
    if (nombre && nombre.trim()) {
      const nuevoId = nextClienteId++;
      clientes.push({ id: nuevoId, nombre: nombre.trim() });
      guardarDatos();
      renderListaClientes();
      seleccionarCliente(nuevoId);
    }
  });
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  // Inicialización
  loadData();
  renderListaClientes();
  if (clientes.length > 0) seleccionarCliente(clientes[0].id);
</script>

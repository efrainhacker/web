<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Excel PRO · Importar / Exportar CSV | Múltiples productos</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0c15;
      font-family: 'Inter', system-ui, sans-serif;
      padding: 2rem 1.5rem;
      color: #eef2ff;
    }

    .dashboard {
      max-width: 1500px;
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      flex-wrap: wrap;
      gap: 1rem;
      margin-bottom: 2rem;
      border-bottom: 1px solid #1e293b;
      padding-bottom: 1rem;
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 700;
      background: linear-gradient(135deg, #c084fc, #60a5fa);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
      display: inline-flex;
      align-items: center;
      gap: 10px;
    }

    .toolbar {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      align-items: center;
    }

    .btn {
      background: #1e293b;
      border: none;
      padding: 8px 18px;
      border-radius: 40px;
      font-weight: 600;
      font-size: 0.85rem;
      color: #e2e8f0;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .btn-primary {
      background: #3b82f6;
      color: white;
      box-shadow: 0 2px 6px rgba(59,130,246,0.3);
    }

    .btn-primary:hover {
      background: #2563eb;
      transform: translateY(-1px);
    }

    .btn-outline {
      border: 1px solid #334155;
      background: transparent;
    }

    .btn-outline:hover {
      background: #1e293b;
      border-color: #5b6e8c;
    }

    .btn-success {
      background: #16a34a;
    }
    .btn-success:hover {
      background: #15803d;
    }

    .search-box {
      background: #111827;
      border: 1px solid #2d3a4e;
      border-radius: 48px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 220px;
    }

    .search-box input {
      background: transparent;
      border: none;
      color: white;
      font-size: 0.9rem;
      outline: none;
      width: 100%;
    }

    .table-wrapper {
      overflow-x: auto;
      border-radius: 24px;
      background: #0f172a;
      border: 1px solid #1e293b;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
      min-width: 950px;
    }

    .data-table th {
      text-align: left;
      padding: 14px 16px;
      background: #111827;
      color: #9ca3af;
      font-weight: 600;
      font-size: 0.8rem;
      letter-spacing: 0.5px;
      border-bottom: 1px solid #2d3a4e;
      cursor: pointer;
      user-select: none;
    }

    .data-table th:hover {
      background: #1a2538;
      color: #e2e8f0;
    }

    .data-table td {
      padding: 12px 16px;
      border-bottom: 1px solid #1e293b;
      vertical-align: middle;
      background-color: #0f172a;
    }

    .editable-cell {
      background: #0f172a;
      transition: background 0.1s;
      cursor: text;
      border-radius: 8px;
      padding: 6px 8px;
      margin: -6px -8px;
      display: inline-block;
      width: 100%;
    }

    .editable-cell[contenteditable="true"] {
      background: #1e2a3e;
      outline: 1px solid #3b82f6;
      box-shadow: 0 0 0 2px rgba(59,130,246,0.3);
    }

    .editable-cell:focus {
      outline: none;
      background: #1e2a3e;
      box-shadow: 0 0 0 2px #3b82f6;
    }

    .estado-select {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 6px 10px;
      border-radius: 20px;
      color: white;
      font-weight: 500;
      font-size: 0.8rem;
      cursor: pointer;
      width: 100%;
    }

    .fecha-input {
      background: #1e293b;
      border: 1px solid #334155;
      padding: 6px 10px;
      border-radius: 16px;
      color: white;
      font-size: 0.8rem;
      font-family: monospace;
      width: 100%;
      cursor: pointer;
    }

    .action-buttons {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .icon-btn {
      background: transparent;
      border: none;
      font-size: 1.2rem;
      cursor: pointer;
      transition: 0.1s;
      padding: 4px 8px;
      border-radius: 30px;
      color: #94a3b8;
    }

    .icon-btn:hover {
      background: #1e293b;
      transform: scale(1.05);
    }

    .delete-btn {
      color: #f87171;
    }
    .delete-btn:hover {
      background: #7f1a1a;
      color: white;
    }
    .duplicate-btn {
      color: #4ade80;
    }
    .duplicate-btn:hover {
      background: #14532d;
      color: white;
    }

    .empty-row {
      text-align: center;
      padding: 40px !important;
      color: #6b7280;
      font-style: italic;
    }

    footer {
      margin-top: 24px;
      text-align: center;
      font-size: 0.7rem;
      color: #4b5563;
    }
  </style>
</head>
<body>
<div class="dashboard">
  <div class="header">
    <h1>📊 EXCEL VENTAS · Múltiples productos por cliente</h1>
    <div class="toolbar">
      <div class="search-box">
        🔍 <input type="text" id="filterInput" placeholder="Filtrar cliente / producto...">
      </div>
      <button class="btn btn-primary" id="addRowBtn">➕ Nueva fila</button>
      <button class="btn btn-outline" id="importCsvBtn">📂 Importar CSV</button>
      <button class="btn btn-outline" id="exportCsvBtn">📎 Exportar CSV</button>
      <button class="btn btn-outline" id="resetDemoBtn">⟳ Reiniciar demo</button>
    </div>
  </div>

  <div class="table-wrapper">
    <table class="data-table" id="ventasTable">
      <thead>
        <tr>
          <th data-sort="cliente">👤 Cliente</th>
          <th data-sort="producto">📦 Producto</th>
          <th data-sort="cantidad">🔢 Cantidad</th>
          <th data-sort="estado">💰 Estado pago</th>
          <th data-sort="fecha">📅 Fecha y hora</th>
          <th style="width: 100px">⚡ Acciones</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
  <footer>✨ Haz clic en cualquier celda para editar. Fecha con selector visual. Botón <span style="color:#4ade80;">➕</span> duplica fila para mismo cliente. ¡Importa tus propios CSV!</footer>
</div>

<script>
  // ---------- MODELO DE DATOS ----------
  let ventas = [];

  // Formatear fecha para guardar en objeto
  function crearFilaDemo(cliente, producto, cantidad, estado, fechaISO, fechaLegible) {
    return { cliente, producto, cantidad, estado, fecha: fechaISO, fechaLegible };
  }

  function crearDemoData() {
    const ahora = new Date();
    const fechaISO = ahora.toISOString().slice(0, 16);
    const fechaLegible = ahora.toLocaleString('es-ES', { hour12: false });
    ventas = [
      crearFilaDemo("Pancho", "Galletas", 1, "Debe", fechaISO, fechaLegible),
      crearFilaDemo("Vicente", "Galletas", 1, "Debe", fechaISO, fechaLegible),
      crearFilaDemo("Ariel", "Galletas", 2, "Debe", fechaISO, fechaLegible),
      crearFilaDemo("Matis", "Galletas", 1, "Debe", fechaISO, fechaLegible),
      crearFilaDemo("Lían", "bonobon grande", 1, "Debe", fechaISO, fechaLegible),
      crearFilaDemo("Magno", "Galletas", 1, "Debe", fechaISO, fechaLegible),
      crearFilaDemo("Brian", "Galletas", 1, "Debe", fechaISO, fechaLegible),
      crearFilaDemo("Pipe", "Galletas", 2, "Debe", fechaISO, fechaLegible),
      crearFilaDemo("Rominous", "Galletas", 2, "Debe", fechaISO, fechaLegible),
      crearFilaDemo("Niko", "Galletas", 1, "Debe", fechaISO, fechaLegible),
      crearFilaDemo("Rodrigo", "Llavero", 1, "Debe", fechaISO, fechaLegible),
      crearFilaDemo("Ariel", "Galletas", 3, "Debe", fechaISO, fechaLegible),
      crearFilaDemo("Magno", "Galletas", 1, "Debe", fechaISO, fechaLegible),
      crearFilaDemo("Rodrigo", "Llavero", 1, "Debe", fechaISO, fechaLegible),
      crearFilaDemo("Ariel", "Galletas", 3, "Debe", fechaISO, fechaLegible),
      crearFilaDemo("Magno", "Galletas", 1, "Debe", fechaISO, fechaLegible),
      crearFilaDemo("Lían", "Bonobon", 2, "Pagado", fechaISO, fechaLegible)
    ];
  }

  function loadInitialData() {
    const stored = localStorage.getItem('excelVentasMultiple');
    if (stored) {
      ventas = JSON.parse(stored);
      if (ventas.length === 0) crearDemoData();
    } else {
      crearDemoData();
    }
    // Asegurar formato
    ventas.forEach(v => {
      if (!v.fechaLegible && v.fecha) {
        const d = new Date(v.fecha);
        v.fechaLegible = isNaN(d.getTime()) ? v.fecha : d.toLocaleString('es-ES', { hour12: false });
      } else if (!v.fechaLegible) {
        const ahora = new Date();
        v.fecha = ahora.toISOString().slice(0, 16);
        v.fechaLegible = ahora.toLocaleString('es-ES', { hour12: false });
      }
    });
    saveToLocalStorage();
    renderTable();
  }

  function saveToLocalStorage() {
    localStorage.setItem('excelVentasMultiple', JSON.stringify(ventas));
  }

  function updateFechaLegible(row) {
    if (row.fecha) {
      const fechaDate = new Date(row.fecha);
      if (!isNaN(fechaDate.getTime())) {
        row.fechaLegible = fechaDate.toLocaleString('es-ES', { hour12: false });
      } else {
        row.fechaLegible = row.fecha;
      }
    } else {
      row.fechaLegible = "";
    }
  }

  // Filtro y orden
  let currentFilter = '';
  let currentSort = { column: 'fecha', direction: 'desc' };

  function renderTable() {
    const tbody = document.getElementById('tableBody');
    if (!tbody) return;

    let filtered = ventas.filter(v => 
      v.cliente.toLowerCase().includes(currentFilter.toLowerCase()) || 
      v.producto.toLowerCase().includes(currentFilter.toLowerCase())
    );

    filtered.sort((a, b) => {
      let valA = a[currentSort.column];
      let valB = b[currentSort.column];
      if (currentSort.column === 'cantidad') {
        valA = Number(valA);
        valB = Number(valB);
      }
      if (currentSort.column === 'fecha') {
        valA = a.fecha || '';
        valB = b.fecha || '';
      }
      if (typeof valA === 'string') {
        return currentSort.direction === 'asc' ? valA.localeCompare(valB) : valB.localeCompare(valA);
      }
      return currentSort.direction === 'asc' ? valA - valB : valB - valA;
    });

    tbody.innerHTML = '';
    if (filtered.length === 0) {
      const emptyRow = document.createElement('tr');
      emptyRow.innerHTML = `<td colspan="6" class="empty-row">✨ Sin datos. Importa CSV o usa "+ Nueva fila" ✨</td>`;
      tbody.appendChild(emptyRow);
      return;
    }

    filtered.forEach((item) => {
      const row = document.createElement('tr');
      
      // Cliente
      const clienteCell = document.createElement('td');
      const clienteSpan = createEditableSpan(item.cliente, (newVal) => { item.cliente = newVal; saveAndRender(); });
      clienteCell.appendChild(clienteSpan);
      
      // Producto
      const prodCell = document.createElement('td');
      const prodSpan = createEditableSpan(item.producto, (newVal) => { item.producto = newVal; saveAndRender(); });
      prodCell.appendChild(prodSpan);
      
      // Cantidad
      const cantCell = document.createElement('td');
      const cantSpan = createEditableSpan(item.cantidad.toString(), (newVal) => {
        let num = parseInt(newVal);
        if (isNaN(num)) num = 0;
        item.cantidad = Math.max(0, num);
        saveAndRender();
      }, 'number');
      cantCell.appendChild(cantSpan);
      
      // Estado
      const estadoCell = document.createElement('td');
      const selectEstado = document.createElement('select');
      selectEstado.className = 'estado-select';
      ['Pagado', 'Debe'].forEach(opt => {
        const option = document.createElement('option');
        option.value = opt;
        option.textContent = opt === 'Pagado' ? '✅ Pagado' : '⏳ Debe';
        if (item.estado === opt) option.selected = true;
        selectEstado.appendChild(option);
      });
      selectEstado.addEventListener('change', (e) => { item.estado = e.target.value; saveAndRender(); });
      estadoCell.appendChild(selectEstado);
      
      // Fecha (datetime-local)
      const fechaCell = document.createElement('td');
      const fechaInput = document.createElement('input');
      fechaInput.type = 'datetime-local';
      fechaInput.className = 'fecha-input';
      fechaInput.value = item.fecha || new Date().toISOString().slice(0, 16);
      fechaInput.addEventListener('change', (e) => {
        item.fecha = e.target.value;
        updateFechaLegible(item);
        saveAndRender();
      });
      fechaCell.appendChild(fechaInput);
      
      // Acciones: duplicar (mismo cliente/fecha) y eliminar
      const accionCell = document.createElement('td');
      const btnWrapper = document.createElement('div');
      btnWrapper.className = 'action-buttons';
      
      const duplicateBtn = document.createElement('button');
      duplicateBtn.innerHTML = '➕';
      duplicateBtn.className = 'icon-btn duplicate-btn';
      duplicateBtn.title = 'Agregar otro producto para este cliente (misma fecha)';
      duplicateBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const newRow = {
          cliente: item.cliente,
          producto: "Nuevo producto",
          cantidad: 1,
          estado: "Debe",
          fecha: item.fecha,
          fechaLegible: item.fechaLegible
        };
        ventas.push(newRow);
        saveAndRender();
        setTimeout(() => {
          const tbodyEl = document.getElementById('tableBody');
          if (tbodyEl.lastChild) tbodyEl.lastChild.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }, 50);
      });
      
      const deleteBtn = document.createElement('button');
      deleteBtn.innerHTML = '🗑️';
      deleteBtn.className = 'icon-btn delete-btn';
      deleteBtn.title = 'Eliminar fila';
      deleteBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        const realIndex = ventas.findIndex(v => v === item);
        if (realIndex !== -1) {
          ventas.splice(realIndex, 1);
          saveAndRender();
        }
      });
      
      btnWrapper.appendChild(duplicateBtn);
      btnWrapper.appendChild(deleteBtn);
      accionCell.appendChild(btnWrapper);
      
      row.appendChild(clienteCell);
      row.appendChild(prodCell);
      row.appendChild(cantCell);
      row.appendChild(estadoCell);
      row.appendChild(fechaCell);
      row.appendChild(accionCell);
      tbody.appendChild(row);
    });
  }

  function createEditableSpan(initialValue, onUpdate, type = 'text') {
    const span = document.createElement('span');
    span.className = 'editable-cell';
    span.contentEditable = 'true';
    span.textContent = initialValue !== undefined && initialValue !== null ? initialValue : '';
    if (type === 'number') span.setAttribute('inputmode', 'numeric');
    span.addEventListener('blur', () => {
      let newValue = span.textContent.trim();
      if (type === 'number') {
        let num = parseInt(newValue);
        if (isNaN(num)) num = 0;
        newValue = num.toString();
        span.textContent = newValue;
      }
      if (newValue !== initialValue) onUpdate(newValue);
    });
    span.addEventListener('keydown', (e) => { if (e.key === 'Enter') { e.preventDefault(); span.blur(); } });
    return span;
  }

  function saveAndRender() {
    saveToLocalStorage();
    renderTable();
  }

  function addNewRow() {
    const ahora = new Date();
    const fechaISO = ahora.toISOString().slice(0, 16);
    const fechaLegible = ahora.toLocaleString('es-ES', { hour12: false });
    ventas.push({
      cliente: "Nuevo cliente",
      producto: "Nuevo producto",
      cantidad: 1,
      estado: "Debe",
      fecha: fechaISO,
      fechaLegible: fechaLegible
    });
    saveAndRender();
    setTimeout(() => {
      const tbody = document.getElementById('tableBody');
      if (tbody.lastChild) tbody.lastChild.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 50);
  }

  // ---------- IMPORTAR CSV ----------
  function importCSV(file) {
    const reader = new FileReader();
    reader.onload = (e) => {
      const text = e.target.result;
      const lines = text.split(/\r?\n/);
      if (lines.length === 0) return;
      const headers = lines[0].split(',').map(h => h.replace(/^\uFEFF/, '').trim().toLowerCase());
      // mapeo flexible: buscamos columnas necesarias
      const idxCliente = headers.findIndex(h => h.includes('cliente'));
      const idxProducto = headers.findIndex(h => h.includes('producto'));
      const idxCantidad = headers.findIndex(h => h.includes('cantidad'));
      const idxEstado = headers.findIndex(h => h.includes('estado') || h.includes('pago'));
      const idxFecha = headers.findIndex(h => h.includes('fecha'));
      
      if (idxCliente === -1 || idxProducto === -1 || idxCantidad === -1) {
        alert("Formato inválido. Se requieren columnas: Cliente, Producto, Cantidad. (Estado y Fecha opcionales)");
        return;
      }
      
      const nuevasFilas = [];
      for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        // parse básico (soporta comillas)
        let cols = [];
        let inQuote = false;
        let current = '';
        for (let ch of lines[i]) {
          if (ch === '"') inQuote = !inQuote;
          else if (ch === ',' && !inQuote) {
            cols.push(current.trim());
            current = '';
          } else {
            current += ch;
          }
        }
        cols.push(current.trim());
        if (cols.length < 3) continue;
        
        const cliente = cols[idxCliente]?.replace(/^"|"$/g, '') || '';
        const producto = cols[idxProducto]?.replace(/^"|"$/g, '') || '';
        let cantidad = parseInt(cols[idxCantidad]);
        if (isNaN(cantidad)) cantidad = 1;
        let estado = (idxEstado !== -1 && cols[idxEstado]) ? (cols[idxEstado].includes('Pagado') ? 'Pagado' : 'Debe') : 'Debe';
        let fechaStr = (idxFecha !== -1 && cols[idxFecha]) ? cols[idxFecha].replace(/^"|"$/g, '') : '';
        
        let fechaISO = null;
        let fechaLegible = null;
        if (fechaStr) {
          let parsedDate = new Date(fechaStr);
          if (!isNaN(parsedDate.getTime())) {
            fechaISO = parsedDate.toISOString().slice(0, 16);
            fechaLegible = parsedDate.toLocaleString('es-ES', { hour12: false });
          } else {
            const ahora = new Date();
            fechaISO = ahora.toISOString().slice(0, 16);
            fechaLegible = ahora.toLocaleString('es-ES', { hour12: false });
          }
        } else {
          const ahora = new Date();
          fechaISO = ahora.toISOString().slice(0, 16);
          fechaLegible = ahora.toLocaleString('es-ES', { hour12: false });
        }
        
        nuevasFilas.push({
          cliente: cliente || "Desconocido",
          producto: producto || "Producto",
          cantidad: cantidad,
          estado: estado,
          fecha: fechaISO,
          fechaLegible: fechaLegible
        });
      }
      
      if (nuevasFilas.length === 0) {
        alert("No se encontraron filas válidas en el CSV.");
        return;
      }
      
      ventas.push(...nuevasFilas);
      saveAndRender();
      alert(`✅ Se importaron ${nuevasFilas.length} filas correctamente.`);
    };
    reader.onerror = () => alert("Error al leer el archivo.");
    reader.readAsText(file, "UTF-8");
  }

  function triggerImport() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.csv';
    input.onchange = (e) => {
      if (e.target.files && e.target.files[0]) {
        importCSV(e.target.files[0]);
      }
    };
    input.click();
  }

  function exportToCSV() {
    if (ventas.length === 0) {
      alert("No hay datos para exportar");
      return;
    }
    const headers = ["Cliente", "Producto", "Cantidad", "EstadoPago", "Fecha"];
    const rows = ventas.map(v => {
      let fechaMostrar = v.fechaLegible || (v.fecha ? new Date(v.fecha).toLocaleString('es-ES') : '');
      return [
        `"${v.cliente.replace(/"/g, '""')}"`,
        `"${v.producto.replace(/"/g, '""')}"`,
        v.cantidad,
        `"${v.estado}"`,
        `"${fechaMostrar}"`
      ];
    });
    const csvContent = [headers.join(","), ...rows.map(r => r.join(","))].join("\n");
    const blob = new Blob(["\uFEFF" + csvContent], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    const url = URL.createObjectURL(blob);
    link.href = url;
    link.setAttribute("download", "ventas_exportadas.csv");
    link.click();
    URL.revokeObjectURL(url);
  }

  function resetToDemo() {
    if (confirm("⚠️ Esto reemplazará todos los datos actuales por el demo inicial. ¿Continuar?")) {
      crearDemoData();
      saveAndRender();
      document.getElementById('filterInput').value = '';
      currentFilter = '';
      currentSort = { column: 'fecha', direction: 'desc' };
      renderTable();
    }
  }

  function setupSorting() {
    const ths = document.querySelectorAll('#ventasTable th[data-sort]');
    ths.forEach(th => {
      th.addEventListener('click', () => {
        const column = th.getAttribute('data-sort');
        if (currentSort.column === column) {
          currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
        } else {
          currentSort.column = column;
          currentSort.direction = 'asc';
        }
        renderTable();
      });
    });
  }

  document.addEventListener('DOMContentLoaded', () => {
    loadInitialData();
    setupSorting();
    document.getElementById('filterInput').addEventListener('input', (e) => {
      currentFilter = e.target.value;
      renderTable();
    });
    document.getElementById('addRowBtn').addEventListener('click', addNewRow);
    document.getElementById('importCsvBtn').addEventListener('click', triggerImport);
    document.getElementById('exportCsvBtn').addEventListener('click', exportToCSV);
    document.getElementById('resetDemoBtn').addEventListener('click', resetToDemo);
  });
</script>
</body>
</html>

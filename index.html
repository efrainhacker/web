<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comida Venezolana · Vista caraquena</title>
  <!-- Font Awesome 6 (gratuito) para iconos profesionales -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
    }

    body {
      background: #fcf6ef;
      color: #1f2a36;
      transition: background 0.25s, color 0.2s;
    }

    /* ------ MODO OSCURO PROFESIONAL ------ */
    body.dark {
      background: #0f0e11;
      color: #f0e7db;
    }

    body.dark header {
      background: linear-gradient(135deg, #2c1a0f, #431f0e);
      border-bottom: 2px solid #c79a6b;
    }

    body.dark .toggle-dark {
      background: #40332a;
      color: #fadbc2;
      border: 1px solid #c2855a;
    }

    body.dark .card {
      background: #1e1916;
      border: 1px solid #524233;
      box-shadow: 0 15px 30px -12px #00000080;
    }

    body.dark .card-header {
      background: #2d241e;
    }

    body.dark .meta-category {
      background: #3d3026;
      color: #f3cfb0;
    }

    body.dark .btn-receta {
      background: #b2622e;
      color: white;
    }

    body.dark footer {
      background: #1e1510;
      border-top: 3px solid #9b6a41;
    }

    body.dark .no-results {
      background: #2a221c;
      border-color: #b57a4b;
      color: #f0d9c2;
    }

    /* ------ HEADER PROFESIONAL ------ */
    header {
      background: linear-gradient(135deg, #8B1E1E, #b13e3e);
      color: white;
      padding: 2.5rem 2rem;
      text-align: center;
      position: relative;
      box-shadow: 0 10px 25px -8px rgba(0,0,0,0.3);
      border-bottom: 5px solid #f5c9a6;
    }

    .header-content {
      max-width: 1200px;
      margin: 0 auto;
    }

    h1 {
      font-size: 3.2rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      text-shadow: 3px 3px 0 #582b1a;
      margin-bottom: 0.5rem;
    }

    .subhead {
      font-size: 1.2rem;
      font-weight: 300;
      opacity: 0.9;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    .toggle-dark {
      position: absolute;
      top: 1.5rem;
      right: 2rem;
      background: rgba(255,250,240,0.2);
      backdrop-filter: blur(8px);
      border: 1.5px solid white;
      color: white;
      padding: 0.7rem 1.7rem;
      border-radius: 60px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .toggle-dark:hover {
      background: rgba(255,255,255,0.35);
      transform: scale(1.02);
    }

    .buscador-wrapper {
      margin-top: 2.2rem;
      display: flex;
      justify-content: center;
    }

    #buscador {
      width: 90%;
      max-width: 700px;
      padding: 1.2rem 2rem;
      border: none;
      border-radius: 70px;
      font-size: 1.2rem;
      background: white;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
      transition: 0.2s;
      border: 3px solid transparent;
    }

    #buscador:focus {
      outline: none;
      border-color: #ffb882;
      background: #fffefc;
    }

    body.dark #buscador {
      background: #2d241c;
      color: #f6e2d0;
      border-color: #664c36;
    }

    /* ------ ESPACIOS PUBLICITARIOS (estilizados) ------ */
    .ad-space {
      background: linear-gradient(145deg, #f3e4d6, #e6d2bf);
      padding: 1.8rem;
      text-align: center;
      margin: 2rem auto;
      border-radius: 70px;
      max-width: 1100px;
      border: 2px dashed #b3805a;
      color: #472e1c;
      font-weight: 600;
      font-size: 1.2rem;
      letter-spacing: 1px;
      box-shadow: inset 0 2px 8px #0000001a;
    }

    body.dark .ad-space {
      background: #2b231d;
      color: #dbbd9e;
      border-color: #9e7e60;
    }

    /* ------ GRID DE RECETAS (estilo "pro") ------ */
    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 2.2rem;
      padding: 2rem 2rem 3rem;
      max-width: 1600px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 40px;
      overflow: hidden;
      box-shadow: 0 25px 35px -15px rgba(99, 44, 13, 0.2);
      transition: all 0.3s cubic-bezier(0.2,0.9,0.3,1);
      display: flex;
      flex-direction: column;
      border: 1px solid #fae1cd;
      backdrop-filter: blur(2px);
    }

    .card:hover {
      transform: translateY(-10px) scale(1.01);
      box-shadow: 0 35px 45px -12px #a14f1e80;
    }

    /* CABECERA DE LA TARJETA CON IMAGEN PERSONALIZADA (emoji + fondo) */
    .card-header {
      height: 220px;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: flex-end;
      justify-content: flex-start;
      padding: 1.5rem;
      color: white;
      text-shadow: 2px 2px 5px black;
      position: relative;
    }

    .card-header::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(0deg, rgba(0,0,0,0.5) 0%, transparent 70%);
      z-index: 1;
    }

    .card-header span {
      font-size: 3.8rem;
      line-height: 1;
      filter: drop-shadow(4px 6px 0 rgba(0,0,0,0.4));
      z-index: 2;
    }

    /* CONTENIDO DE TARJETA */
    .card-content {
      padding: 1.8rem 1.8rem 2.2rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .card-content h3 {
      font-size: 2rem;
      font-weight: 700;
      color: #8B1E1E;
      margin-bottom: 0.4rem;
      line-height: 1.2;
    }
    body.dark .card-content h3 {
      color: #f5ba8a;
    }

    .meta-category {
      display: inline-block;
      background: #fae3d1;
      padding: 0.3rem 1.4rem;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 600;
      color: #6b3f21;
      margin-bottom: 1rem;
      letter-spacing: 0.3px;
      width: fit-content;
    }

    .tiempo-dificultad {
      display: flex;
      gap: 1.2rem;
      margin-bottom: 1rem;
      color: #5b4b3c;
      font-size: 0.95rem;
      font-weight: 500;
    }
    .tiempo-dificultad i {
      color: #b7622c;
      width: 20px;
    }
    body.dark .tiempo-dificultad {
      color: #cbb39b;
    }

    .btn-receta {
      background: #8B1E1E;
      color: white;
      border: none;
      padding: 1rem 1.5rem;
      border-radius: 50px;
      font-weight: 700;
      font-size: 1.1rem;
      cursor: pointer;
      transition: 0.2s;
      margin: 1rem 0 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      box-shadow: 0 6px 14px #8b1e1e60;
    }

    .btn-receta:hover {
      background: #ac2f2f;
      transform: scale(1.02);
    }

    .detalle {
      display: none;
      margin-top: 1.8rem;
      border-top: 2px dashed #c99b77;
      padding-top: 1.5rem;
    }

    .detalle h4 {
      color: #8B1E1E;
      font-size: 1.4rem;
      margin: 1.2rem 0 0.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    body.dark .detalle h4 {
      color: #eeb389;
    }

    .detalle ul, .detalle ol {
      margin-left: 1.5rem;
      line-height: 1.8;
    }
    .detalle li {
      margin-bottom: 0.4rem;
    }
    .detalle .consejo {
      background: #fff5e9;
      padding: 1rem 1.5rem;
      border-radius: 30px;
      margin-top: 1rem;
      font-style: italic;
      border-left: 6px solid #b7622c;
    }
    body.dark .detalle .consejo {
      background: #2f261e;
      border-left-color: #c28b59;
    }

    footer {
      background: #221a15;
      color: #eedac9;
      text-align: center;
      padding: 2.5rem;
      font-size: 1.2rem;
      border-top: 6px solid #ad5d2c;
      margin-top: 2rem;
    }

    .no-results {
      grid-column: 1/-1;
      background: #fae8da;
      border: 4px dashed #8B1E1E;
      border-radius: 80px;
      padding: 5rem 3rem;
      text-align: center;
      font-size: 2rem;
      color: #542f18;
    }

    /* Responsive */
    @media (max-width: 650px) {
      h1 { font-size: 2.2rem; }
      .toggle-dark { top: 1rem; right: 1rem; padding: 0.5rem 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-content">
    <button class="toggle-dark" id="darkBtn"><i class="fas fa-moon"></i> <span>Modo Oscuro</span></button>
    <h1>🇻🇪 Comida Venezolana</h1>
    <div class="subhead">
      <i class="fas fa-utensils"></i> vista desde un caraqueño <i class="fas fa-eye"></i>
    </div>
    <div class="buscador-wrapper">
      <input type="text" id="buscador" placeholder="🔍 Buscar por nombre, categoría o ingrediente...">
    </div>
  </div>
</header>

<div class="ad-space">
  <i class="fas fa-ad"></i> ESPACIO PARA GOOGLE ADSENSE · PUBLICIDAD <i class="fas fa-ad"></i>
</div>

<div class="container" id="contenedor"></div>

<div class="ad-space">
  <i class="fas fa-tag"></i> PRODUCTOS RECOMENDADOS · ENLACES DE AFILIADO <i class="fas fa-shopping-cart"></i>
</div>

<footer>
  © 2026 Comida Venezolana Vista Desde un Caraqueño · Proyecto listo para monetización
</footer>

<script>
  (function() {
    // ---------- ARRAY DE RECETAS (con emojis y fondos únicos) ----------
    const recetas = [
      // ---- Postres ----
      { titulo:"Torta Negra Navidena", categoria:"Postres", tiempo:"2h", rendimiento:"10 porc", dificultad:"Alta",
        ingredientes:["Harina","Frutas maceradas","Mantequilla","Huevos","Azúcar morena"],
        preparacion:["Cremar mantequilla con azúcar.","Incorporar huevos uno a uno.","Agregar frutas enharinadas.","Hornear lentamente."],
        consejo:"Mejora si reposa varios días.", emoji:"🍰", fondo:"linear-gradient(135deg, #724328, #3f2517)" },
      { titulo:"Golfeados Caraqueños", categoria:"Panadería", tiempo:"2h", rendimiento:"12 uni", dificultad:"Media",
        ingredientes:["Harina","Levadura","Papelón rallado","Queso blanco"],
        preparacion:["Amasar y dejar fermentar.","Rellenar con papelón.","Hornear y cubrir con queso."],
        consejo:"Servir tibios.", emoji:"🥐", fondo:"linear-gradient(145deg, #c99e67, #a5662b)" },
      { titulo:"Quesillo Venezolano", categoria:"Postres", tiempo:"1h", rendimiento:"8 porc", dificultad:"Media",
        ingredientes:["Huevos","Leche condensada","Leche líquida","Azúcar"],
        preparacion:["Caramelizar molde.","Licuar ingredientes.","Hornear a baño maría."],
        consejo:"Reposar en frío mínimo 4h.", emoji:"🍮", fondo:"radial-gradient(circle at 30% 30%, #f1cf9c, #bf8a4b)" },
      { titulo:"Majarete Venezolano", categoria:"Postres", tiempo:"40min", rendimiento:"6 porc", dificultad:"Fácil",
        ingredientes:["Harina de maíz","Leche de coco","Azúcar","Canela"],
        preparacion:["Disolver harina en leche.","Cocinar hasta espesar.","Verter en moldes y enfriar."],
        consejo:"Servir bien frío.", emoji:"🥥", fondo:"linear-gradient(145deg, #f5e1b0, #c7a251)" },
      // ---- Bebidas ----
      { titulo:"Chicha Criolla", categoria:"Bebidas", tiempo:"40min", rendimiento:"6 vasos", dificultad:"Fácil",
        ingredientes:["Arroz cocido","Leche","Azúcar","Canela"],
        preparacion:["Licuar arroz con leche.","Colar si se desea textura fina.","Servir fría con canela."],
        consejo:"Reposar en frío intensifica sabor.", emoji:"🥛", fondo:"#dab07e" },
      { titulo:"Guarapo de Papelón con Limón", categoria:"Bebidas", tiempo:"10min", rendimiento:"4 vasos", dificultad:"Fácil",
        ingredientes:["Papelón","Agua","Jugo de limón"],
        preparacion:["Disolver papelón en agua.","Agregar limón al final.","Servir con hielo."],
        consejo:"No hervir tras añadir limón.", emoji:"🍋", fondo:"linear-gradient(145deg, #dbcf93, #b89e40)" },
      // ---- Platos principales ----
      { titulo:"Pabellón Caraqueño Clásico", categoria:"Principal", tiempo:"1h", rendimiento:"4 porc", dificultad:"Media",
        ingredientes:["Carne mechada","Arroz blanco","Caraotas negras","Plátano maduro frito"],
        preparacion:["Servir arroz como base.","Colocar carne mechada jugosa.","Añadir caraotas bien sazonadas.","Coronar con tajadas crujientes."],
        consejo:"El equilibrio entre dulce y salado es esencial.", emoji:"🍛", fondo:"linear-gradient(145deg, #b95f2a, #713a18)" },
      { titulo:"Hallaca Caraqueña", categoria:"Navidad", tiempo:"6h", rendimiento:"25 uni", dificultad:"Alta",
        ingredientes:["Harina de maíz","Caldo de gallina","Guiso de res y cerdo","Aceitunas","Alcaparras","Pasas","Hojas de plátano"],
        preparacion:["Preparar masa suave con caldo.","Cocinar guiso concentrado.","Extender masa, rellenar y decorar.","Envolver y hervir 45 min."],
        consejo:"La clave está en el equilibrio dulce-salado.", emoji:"🫔", fondo:"#64854e" },
      { titulo:"Asado Negro Caraqueño", categoria:"Carnes", tiempo:"2h", rendimiento:"6 porc", dificultad:"Media",
        ingredientes:["1 kg muchacho redondo","2 cdas azúcar","1 cebolla","3 ajos","1 taza vino tinto","2 tazas caldo"],
        preparacion:["Sellar la carne.","Caramelizar azúcar.","Incorporar cebolla, ajo, vino y caldo.","Cocinar tapado hasta ablandar."],
        consejo:"El caramelo debe ser oscuro pero no quemado.", emoji:"🥩", fondo:"#482818" },
      // ---- Arepas y pasapalos ----
      { titulo:"Arepa Reina Pepiada", categoria:"Arepas", tiempo:"30min", rendimiento:"4 porc", dificultad:"Fácil",
        ingredientes:["Arepas asadas","Pollo desmechado","Aguacate","Mayonesa","Sal"],
        preparacion:["Mezclar pollo con aguacate triturado.","Ajustar sal y cremosidad.","Rellenar."],
        consejo:"Servir inmediatamente.", emoji:"🥑", fondo:"#dba562" },
      { titulo:"Tequenos Tradicionales", categoria:"Pasapalos", tiempo:"40min", rendimiento:"20 uni", dificultad:"Media",
        ingredientes:["Queso blanco firme","Masa de trigo","Aceite"],
        preparacion:["Cortar queso.","Envolver en masa.","Freír hasta dorar."],
        consejo:"Aceite a 170°C evita que se abran.", emoji:"🧀", fondo:"#e5b778" },
      { titulo:"Cachapa de Maíz Tierno", categoria:"Desayunos", tiempo:"25min", rendimiento:"4 uni", dificultad:"Fácil",
        ingredientes:["Maíz tierno molido","Sal","Azúcar ligera","Queso de mano"],
        preparacion:["Licuar maíz hasta mezcla espesa.","Cocinar en budare.","Rellenar con queso."],
        consejo:"No hacerla muy delgada.", emoji:"🌽", fondo:"#f4c542" },
      // ---- Sopas ----
      { titulo:"Sancocho de Gallina", categoria:"Sopas", tiempo:"2h", rendimiento:"6 porc", dificultad:"Media",
        ingredientes:["Gallina","Yuca","Plátano verde","Maíz","Cilantro"],
        preparacion:["Hervir gallina hasta suavizar.","Agregar tubérculos.","Servir con cilantro fresco."],
        consejo:"Espumar durante cocción.", emoji:"🍗", fondo:"#bc8f4b" },
      { titulo:"Sopa de Mondongo", categoria:"Sopas", tiempo:"3h", rendimiento:"8 porc", dificultad:"Alta",
        ingredientes:["Mondongo limpio","Yuca","Papas","Maíz","Aliños"],
        preparacion:["Cocinar mondongo hasta ablandar.","Incorporar vegetales.","Hervir hasta integrar."],
        consejo:"Lavado previo elimina olores.", emoji:"🥣", fondo:"#7c5e3a" },
      // ---- Acompañantes ----
      { titulo:"Tostones Caraqueños", categoria:"Acompañantes", tiempo:"25min", rendimiento:"4 porc", dificultad:"Fácil",
        ingredientes:["Plátano verde","Aceite","Sal"],
        preparacion:["Freír en dos tiempos.","Aplastar tras primera fritura.","Freír nuevamente."],
        consejo:"Doble fritado da crocancia.", emoji:"🍌", fondo:"#e5b062" },
      { titulo:"Tajadas con Queso", categoria:"Acompañantes", tiempo:"20min", rendimiento:"3 porc", dificultad:"Fácil",
        ingredientes:["Plátano maduro","Queso blanco rallado","Aceite"],
        preparacion:["Cortar láminas.","Freír hasta dorado.","Espolvorear queso."],
        consejo:"Plátano muy maduro.", emoji:"🧀", fondo:"#d9a755" },
    ];

    // Duplicamos algunas para llegar visualmente a más de 20 (simulacro de colección)
    const recetasExtendidas = [...recetas];
    for (let i = 0; i < 8; i++) {
      recetasExtendidas.push({ ...recetas[i % recetas.length], titulo: recetas[i % recetas.length].titulo + ' (estilo)' });
    }

    // Referencias DOM
    const contenedor = document.getElementById('contenedor');
    const buscador = document.getElementById('buscador');
    const darkBtn = document.getElementById('darkBtn');

    // ---------- MODO OSCURO ----------
    function toggleDark() {
      document.body.classList.toggle('dark');
      const isDark = document.body.classList.contains('dark');
      localStorage.setItem('modo-oscuro-caraqueno', isDark ? 'dark' : 'light');
      darkBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i> Modo Claro' : '<i class="fas fa-moon"></i> Modo Oscuro';
    }
    darkBtn.addEventListener('click', toggleDark);
    if (localStorage.getItem('modo-oscuro-caraqueno') === 'dark') {
      document.body.classList.add('dark');
      darkBtn.innerHTML = '<i class="fas fa-sun"></i> Modo Claro';
    }

    // ---------- RENDER DE TARJETAS (con imagen emoji) ----------
    function renderRecetas(lista) {
      contenedor.innerHTML = '';
      if (lista.length === 0) {
        contenedor.innerHTML = '<div class="no-results"><i class="fas fa-sad-tear"></i>  No hay recetas con esos términos</div>';
        return;
      }
      lista.forEach((receta, idx) => {
        const card = document.createElement('div');
        card.className = 'card';

        // Header con imagen (fondo personalizado + emoji)
        const headerStyle = `background-image: ${receta.fondo}; background-color: #b47a56; background-blend-mode: overlay;`;

        card.innerHTML = `
          <div class="card-header" style="${headerStyle} background-size: cover; background-position: center;">
            <span>${receta.emoji || '🍽️'}</span>
          </div>
          <div class="card-content">
            <h3>${receta.titulo}</h3>
            <div class="meta-category"><i class="fas fa-tag"></i> ${receta.categoria}</div>
            <div class="tiempo-dificultad">
              <span><i class="far fa-clock"></i> ${receta.tiempo}</span>
              <span><i class="fas fa-chart-line"></i> ${receta.dificultad}</span>
              <span><i class="fas fa-users"></i> ${receta.rendimiento}</span>
            </div>
            <button class="btn-receta" onclick="toggleDetalle(${idx})"><i class="fas fa-book-open"></i> Ver receta</button>
            <div class="detalle" id="detalle-${idx}">
              <h4><i class="fas fa-shopping-basket"></i> Ingredientes</h4>
              <ul>${receta.ingredientes.map(i => `<li>${i}</li>`).join('')}</ul>
              <h4><i class="fas fa-utensil-spoon"></i> Preparación</h4>
              <ol>${receta.preparacion.map(p => `<li>${p}</li>`).join('')}</ol>
              <div class="consejo"><i class="fas fa-lightbulb"></i> ${receta.consejo}</div>
            </div>
          </div>
        `;
        contenedor.appendChild(card);
      });
    }

    // Función global para toggle detalle
    window.toggleDetalle = function(id) {
      const el = document.getElementById('detalle-' + id);
      if (el) el.style.display = el.style.display === 'block' ? 'none' : 'block';
    };

    // Filtro
    function filtrar() {
      const texto = buscador.value.toLowerCase().trim();
      const filtradas = recetasExtendidas.filter(r =>
        r.titulo.toLowerCase().includes(texto) ||
        r.categoria.toLowerCase().includes(texto) ||
        r.ingredientes.some(i => i.toLowerCase().includes(texto))
      );
      renderRecetas(filtradas);
    }
    buscador.addEventListener('keyup', filtrar);
    buscador.addEventListener('search', filtrar);

    // Render inicial
    renderRecetas(recetasExtendidas);
  })();
</script>
</body>
</html>

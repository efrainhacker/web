<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Video Splitter YouTube</title>
  <script src="https://cdn.jsdelivr.net/npm/@ffmpeg/ffmpeg@0.12.6/dist/ffmpeg.min.js"></script>
</head>
<body>
  <h2>Dividir y Convertir Videos de YouTube</h2>
  <input id="ytUrl" type="text" placeholder="Pega el link de YouTube" size="60">
  <br><br>
  <label>Orientación:</label>
  <select id="orientation">
    <option value="horizontal">Horizontal (1920x1080)</option>
    <option value="vertical">Vertical (1080x1920)</option>
  </select>
  <br><br>
  <button onclick="procesar()">Procesar Video</button>
  <div id="log"></div>
  <div id="result"></div>

  <script>
    const { createFFmpeg, fetchFile } = FFmpeg;
    const ffmpeg = createFFmpeg({ log: true });

    async function procesar() {
      const log = (msg) => document.getElementById("log").innerHTML += msg + "<br>";
      document.getElementById("log").innerHTML = "";
      document.getElementById("result").innerHTML = "";

      const url = document.getElementById("ytUrl").value;
      const orientation = document.getElementById("orientation").value;

      if (!url) return alert("Por favor pega un link de YouTube");

      log("Descargando video...");

      // Usamos API de piped.video para obtener mp4 sin CORS
      const apiUrl = `https://pipedapi.kavin.rocks/streams/${extractId(url)}`;
      const res = await fetch(apiUrl);
      const data = await res.json();
      const fileUrl = data.videoStreams.find(v => v.quality === "720p")?.url || data.videoStreams[0].url;

      const response = await fetch(fileUrl);
      const buffer = await response.arrayBuffer();

      if (!ffmpeg.isLoaded()) {
        log("Cargando FFmpeg...");
        await ffmpeg.load();
      }

      ffmpeg.FS("writeFile", "input.mp4", new Uint8Array(buffer));

      log("Procesando...");

      // Elegir filtro según orientación
      let vfFilter = "";
      if (orientation === "horizontal") {
        vfFilter = "scale=-1:1080,pad=1920:1080:(ow-iw)/2:(oh-ih)/2:black";
      } else {
        vfFilter = "scale=1080:-1,pad=1080:1920:(ow-iw)/2:(oh-ih)/2:black";
      }

      // Dividir en clips de 2 minutos
      await ffmpeg.run(
        "-i", "input.mp4",
        "-vf", vfFilter,
        "-c:v", "libx264",
        "-map", "0",
        "-f", "segment",
        "-segment_time", "120",
        "-reset_timestamps", "1",
        "out%03d.mp4"
      );

      log("Generando enlaces...");

      let i = 0;
      while (true) {
        try {
          const name = `out${String(i).padStart(3, "0")}.mp4`;
          const data = ffmpeg.FS("readFile", name);
          const blob = new Blob([data.buffer], { type: "video/mp4" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = name;
          a.innerText = `Descargar ${name}`;
          document.getElementById("result").appendChild(a);
          document.getElementById("result").appendChild(document.createElement("br"));
          i++;
        } catch (e) {
          break;
        }
      }

      log("✅ Listo");
    }

    function extractId(url) {
      const reg = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([^&]+)/;
      const match = url.match(reg);
      return match ? match[1] : url;
    }
  </script>
</body>
</html>

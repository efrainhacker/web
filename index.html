        sectionDiv.innerHTML = `<div class="section-title">${section.title}</div><div class="upload-row"><div class="upload-card"><h3>📁 Subir archivo</h3><input type="file" id="imageFileInput" class="input-field"><button class="btn-primary" id="previewFileBtn">👁️ Vista previa</button></div><div class="upload-card"><h3>🔗 Comparte el enlace</h3><input type="text" id="imageUrlInput" class="input-field" placeholder="https://..."><button class="btn-primary" id="previewUrlBtn">🌐 Vista previa</button><div id="globalPreview" class="preview-area">⬅️ Vista previa</div><button id="sendWhatsappBtn" class="btn-primary" style="background:#25D366;">📲 Enviar por WhatsApp</button></div></div>`;
      } else if(section.type === 'products'){
        let html = `<div class="section-title">${section.title}</div><div class="products-grid">`;
        section.items.forEach((prod, pidx) => { html += `<div class="product-item" data-prod-idx="${pidx}"><div class="product-img-frame"><img src="${prod.img}"></div><h4 class="prod-title">${prod.title}</h4><div class="product-price">${prod.price}</div><button class="whatsapp-small" data-wa="${prod.wa}">Consultar por WA</button></div>`; });
        html += `</div>`; sectionDiv.innerHTML = html;
      } else if(section.type === 'contact_form'){
        sectionDiv.innerHTML = `<div class="contact-form"><h3>${section.title}</h3><form id="contactForm"><div class="form-group"><input type="text" id="contactName" class="form-input" placeholder="Tu nombre *" required></div><div class="form-group"><input type="tel" id="contactPhone" class="form-input" placeholder="Teléfono *" required></div><div class="form-group"><textarea id="contactMessage" class="form-input" rows="3" placeholder="Cuéntanos tu idea..." required></textarea></div><button type="submit" class="btn-primary" style="background:#b47c48;">📩 Enviar consulta por correo</button></form><p style="font-size:0.75rem; margin-top:12px;">Tus datos serán enviados directamente a nuestro equipo.</p></div>`;
      } else if(section.type === 'youtube'){
        sectionDiv.innerHTML = `<div class="youtube-video"><h3>${section.title}</h3><iframe src="${section.url}" frameborder="0" allowfullscreen></iframe></div>`;
      }
      container.appendChild(sectionDiv);
    });
    // Renderizar videos globales (al final)
    renderGlobalYouTube();
    attachGlobalEvents();
    if(authenticated) enableInlineEditing();
  }

  function renderGlobalYouTube() {
    const youtubeContainer = document.getElementById('globalYouTubeContainer');
    youtubeContainer.innerHTML = '';
    globalYouTubeVideos.forEach((video, idx) => {
      const videoDiv = document.createElement('div'); videoDiv.className = 'youtube-video'; videoDiv.setAttribute('data-video-idx', idx);
      videoDiv.innerHTML = `<h3 contenteditable="${authenticated}">${video.title}</h3><iframe src="${video.url}" frameborder="0" allowfullscreen></iframe>`;
      if(authenticated){
        const delBtn = document.createElement('div'); delBtn.className = 'edit-overlay'; delBtn.innerHTML = '<i class="fas fa-trash-alt"></i>'; delBtn.style.left = '8px'; delBtn.style.right = 'auto';
        delBtn.onclick = (e) => { e.stopPropagation(); if(confirm('Eliminar este video?')){ globalYouTubeVideos.splice(idx,1); saveAll(); renderGlobalYouTube(); } };
        videoDiv.appendChild(delBtn);
        const editTitle = videoDiv.querySelector('h3');
        editTitle.addEventListener('blur', () => { globalYouTubeVideos[idx].title = editTitle.innerText; saveAll(); });
      }
      youtubeContainer.appendChild(videoDiv);
    });
    if(authenticated){
      const addVideoBtn = document.createElement('div'); addVideoBtn.style.textAlign = 'center'; addVideoBtn.style.margin = '20px';
      addVideoBtn.innerHTML = '<button id="addGlobalVideoBtn" class="btn-primary" style="background:#25D366;">➕ Agregar video YouTube (final)</button>';
      youtubeContainer.appendChild(addVideoBtn);
      document.getElementById('addGlobalVideoBtn')?.addEventListener('click', () => {
        const url = prompt('URL de YouTube (embed):', 'https://www.youtube.com/embed/dQw4w9WgXcQ');
        if(url){
          const title = prompt('Título del video:', 'Video destacado');
          globalYouTubeVideos.push({ title: title || 'Video', url: url });
          saveAll();
          renderGlobalYouTube();
        }
      });
    }
  }

  function initCarousel(container, section) {
    const track = container.querySelector('[data-carousel-track]');
    const slides = track.querySelectorAll('.carousel-slide');
    const slideWidth = 220 + 16;
    let currentIdx = 0;
    const update = () => {
      const visible = Math.floor(track.parentElement.clientWidth / slideWidth) || 1;
      const max = Math.max(0, slides.length - visible);
      currentIdx = Math.min(max, Math.max(0, currentIdx));
      track.style.transform = `translateX(-${currentIdx * slideWidth}px)`;
    };
    container.querySelector('[data-carousel-left]').onclick = () => { currentIdx--; update(); };
    container.querySelector('[data-carousel-right]').onclick = () => { currentIdx++; update(); };
    window.addEventListener('resize', update);
    setTimeout(update, 100);
  }

  function attachGlobalEvents() {
    document.querySelectorAll('img').forEach(img => {
      img.removeEventListener('click', zoomHandler);
      img.addEventListener('click', zoomHandler);
    });
    const previewFile = document.getElementById('previewFileBtn');
    if(previewFile) previewFile.onclick = () => { const file = document.getElementById('imageFileInput').files[0]; if(file){ const reader = new FileReader(); reader.onload = e => { document.getElementById('globalPreview').innerHTML = `<img src="${e.target.result}">`; window.currentImageData = e.target.result; window.currentSource='file'; }; reader.readAsDataURL(file); } };
    const previewUrl = document.getElementById('previewUrlBtn');
    if(previewUrl) previewUrl.onclick = () => { let url = document.getElementById('imageUrlInput').value; if(url){ const div = document.getElementById('globalPreview'); div.innerHTML='Cargando...'; const img=new Image(); img.onload=()=>{ div.innerHTML=`<img src="${url}">`; window.currentImageData=url; window.currentSource='url'; }; img.onerror=()=>div.innerHTML='Error'; img.src=url; } };
    const sendWA = document.getElementById('sendWhatsappBtn');
    if(sendWA) sendWA.onclick = () => { let msg = "🪵 *Kshai Design* - Cotización%0A"; if(window.currentImageData){ if(window.currentSource==='url') msg+=`🎨 Enlace diseño: ${window.currentImageData}%0A`; else msg+=`🖼️ Imagen previsualizada%0A`; } else msg+=`✨ Diseño a definir%0A`; msg+=`%0A💬 Más info por favor.`; window.open(`https://wa.me/56949510888?text=${msg}`, '_blank'); };
    document.querySelectorAll('.whatsapp-small').forEach(btn => btn.onclick = () => { let msg = `🪵 *Kshai Design* - Producto: ${btn.getAttribute('data-wa')}%0A¡Quiero más info!`; window.open(`https://wa.me/56949510888?text=${msg}`, '_blank'); });
    const contactForm = document.getElementById('contactForm');
    if(contactForm) contactForm.onsubmit = (e) => { e.preventDefault(); const nom=document.getElementById('contactName').value, tel=document.getElementById('contactPhone').value, msg=document.getElementById('contactMessage').value; if(nom&&tel&&msg){ window.location.href=`mailto:kshaidesign@gmail.com?subject=Consulta desde web - ${nom}&body=Nombre: ${nom}%0ATeléfono: ${tel}%0AMensaje: ${msg}`; alert('Correo abierto. ¡Gracias!'); } else alert('Complete todos los campos'); };
  }
  function zoomHandler(e) { document.getElementById('modalImg').src = this.src; document.getElementById('imageModal').classList.add('active'); }

  // Edición inline (admin)
  function enableInlineEditing() {
    document.querySelectorAll('.hero-title, .hero-sub, .price-badge, .section-title, .service-card h4, .precision-banner h3, .precision-banner p, .product-price, .prod-title, .pinterest-card .caption, .contact-form h3').forEach(el => {
      el.setAttribute('contenteditable', 'true'); el.style.cursor = 'text';
      el.addEventListener('blur', () => { saveTextChanges(el); });
    });
    document.querySelectorAll('.product-img-frame img, .carousel-slide img, .pinterest-card img, .logo-img').forEach(img => {
      if(img.parentElement && !img.parentElement.querySelector('.edit-img-overlay')){
        const btn = document.createElement('div'); btn.className = 'edit-overlay'; btn.innerHTML = '<i class="fas fa-pencil-alt"></i>'; btn.style.top='8px'; btn.style.right='8px';
        btn.onclick = (e) => { e.stopPropagation(); const newUrl = prompt('Nueva URL de imagen:', img.src); if(newUrl) img.src = newUrl; else { const input=document.createElement('input'); input.type='file'; input.accept='image/*'; input.onchange=ev=>{ const f=ev.target.files[0]; if(f){ const rd=new FileReader(); rd.onload=e2=>{ img.src=e2.target.result; saveAll(); }; rd.readAsDataURL(f); } }; input.click(); } saveAll(); };
        img.parentElement.style.position = 'relative'; img.parentElement.appendChild(btn);
      }
    });
    // Botones para agregar slides al carrusel
    const carouselSection = document.querySelector('.carousel-container')?.parentElement;
    if(carouselSection && !carouselSection.querySelector('.carousel-admin')){
      const adminDiv = document.createElement('div'); adminDiv.className = 'carousel-admin'; adminDiv.style.textAlign='center'; adminDiv.style.marginTop='15px';
      adminDiv.innerHTML = `<button class="btn-primary" id="addCarouselSlide">➕ Agregar slide al carrusel</button>`;
      carouselSection.appendChild(adminDiv);
      document.getElementById('addCarouselSlide').onclick = () => {
        const page = pages.find(p=>p.id === currentPageId);
        const carouselSec = page.content.sections.find(s => s.type === 'carousel');
        if(carouselSec){
          const newUrl = prompt('URL de la imagen (o cancelar para subir archivo):');
          if(newUrl) carouselSec.items.push({ img: newUrl, caption: 'Nuevo diseño' });
          saveAll(); renderPage();
        }
      };
    }
  }
  function saveTextChanges(el) {
    const page = pages.find(p=>p.id === currentPageId);
    if(!page) return;
    const sectionDiv = el.closest('.section');
    const idx = sectionDiv?.getAttribute('data-section-idx');
    if(idx !== undefined){
      const section = page.content.sections[parseInt(idx)];
      if(section.type === 'hero'){
        if(el.classList.contains('hero-title')) section.title = el.innerText;
        else if(el.classList.contains('hero-sub')) section.subtitle = el.innerText;
        else if(el.classList.contains('price-badge')) section.price = el.innerText;
      } else if(section.type === 'services'){
        if(el.classList.contains('section-title')) section.title = el.innerText;
        else if(el.parentElement?.classList.contains('service-card')){
          const i = Array.from(el.parentElement.parentElement.children).indexOf(el.parentElement);
          if(i!==-1) section.items[i] = el.innerText;
        }
      } else if(section.type === 'precision'){
        if(el.tagName === 'H3') section.text = el.innerText + '\n' + section.text.split('\n').slice(1).join('\n');
        else if(el.tagName === 'P') section.text = section.text.split('\n')[0] + '\n' + el.innerText;
      } else if(section.type === 'products'){
        const prodDiv = el.closest('.product-item');
        if(prodDiv){
          const pidx = prodDiv.getAttribute('data-prod-idx');
          if(el.classList.contains('prod-title')) section.items[pidx].title = el.innerText;
          if(el.classList.contains('product-price')) section.items[pidx].price = el.innerText;
        } else if(el.classList.contains('section-title')) section.title = el.innerText;
      } else if(section.type === 'pinterest'){
        if(el.classList.contains('section-title')) section.title = el.innerText;
        else if(el.classList.contains('caption')){
          const card = el.closest('.pinterest-card');
          const idx2 = Array.from(card.parentElement.children).indexOf(card);
          if(idx2!==-1) section.items[idx2].caption = el.innerText;
        }
      } else if(section.type === 'contact_form'){
        if(el.classList.contains('section-title') || el.tagName==='H3') section.title = el.innerText;
      }
      saveAll();
    } else {
      if(el.id === 'siteTitle') saveAll();
      else if(el.id === 'siteSub') saveAll();
      else if(el.id === 'navContactText') saveAll();
    }
  }

  // Navegación y páginas
  function renderPageNav() {
    const container = document.getElementById('pageNavContainer');
    container.innerHTML = '';
    pages.forEach(page => {
      const btn = document.createElement('button'); btn.innerText = page.name; btn.className = 'page-btn';
      btn.onclick = () => { currentPageId = page.id; renderPage(); renderPageNav(); };
      if(currentPageId === page.id) btn.style.background = '#2c1b12';
      container.appendChild(btn);
    });
    if(authenticated){
      const addBtn = document.createElement('button'); addBtn.innerText = '+ Nueva página'; addBtn.className = 'page-btn add-page-btn';
      addBtn.onclick = () => { const name = prompt('Nombre de la nueva página:'); if(name){ const newId = 'page_'+Date.now(); const newPage = { id:newId, name:name, content:{ sections: [] } }; pages.push(newPage); saveAll(); renderPageNav(); } };
      container.appendChild(addBtn);
      pages.forEach((page, idx) => {
        const editBtn = document.createElement('button'); editBtn.innerText = '✏️'; editBtn.className = 'page-btn';
        editBtn.onclick = () => { const newName = prompt('Editar nombre:', page.name); if(newName){ page.name = newName; saveAll(); renderPageNav(); } };
        container.appendChild(editBtn);
        const delBtn = document.createElement('button'); delBtn.innerText = '🗑️'; delBtn.className = 'page-btn';
        delBtn.onclick = () => { if(confirm('Eliminar página?')){ pages.splice(idx,1); if(pages.length===0) pages.push(JSON.parse(JSON.stringify(DEFAULT_HOME))); if(currentPageId===page.id) currentPageId=pages[0].id; saveAll(); renderPageNav(); renderPage(); } };
        container.appendChild(delBtn);
      });
      const addSectionBtn = document.createElement('button'); addSectionBtn.innerText = '+ Agregar sección'; addSectionBtn.className = 'page-btn'; addSectionBtn.style.background = '#25D366';
      addSectionBtn.onclick = () => {
        const type = prompt('Tipo de sección: hero, services, precision, carousel, pinterest, upload_section, products, contact_form, youtube', 'hero');
        if(!type) return;
        const page = pages.find(p=>p.id === currentPageId);
        let newSec = { type: type };
        if(type === 'hero') newSec = { type:'hero', title:'Nuevo título', subtitle:'Subtítulo', price:'DESDE $0' };
        if(type === 'services') newSec = { type:'services', title:'Servicios', items:['Item 1','Item 2'] };
        if(type === 'precision') newSec = { type:'precision', text:'Título\\nDescripción larga.' };
        if(type === 'carousel') newSec = { type:'carousel', items:[] };
        if(type === 'pinterest') newSec = { type:'pinterest', title:'Inspiración', items:[] };
        if(type === 'upload_section') newSec = { type:'upload_section', title:'📸 SUBE TU IMAGEN' };
        if(type === 'products') newSec = { type:'products', title:'Productos', items:[] };
        if(type === 'contact_form') newSec = { type:'contact_form', title:'📧 Formulario de contacto' };
        if(type === 'youtube') newSec = { type:'youtube', title:'Video', url:'https://www.youtube.com/embed/dQw4w9WgXcQ' };
        page.content.sections.push(newSec);
        saveAll(); renderPage();
      };
      container.appendChild(addSectionBtn);
      const socialBtn = document.createElement('button'); socialBtn.innerText = '📱 Redes Sociales'; socialBtn.className = 'page-btn';
      socialBtn.onclick = () => { socialLinks.facebook = prompt('Facebook URL:', socialLinks.facebook)||''; socialLinks.instagram = prompt('Instagram URL:', socialLinks.instagram)||''; socialLinks.tiktok = prompt('TikTok URL:', socialLinks.tiktok)||''; socialLinks.whatsapp = prompt('WhatsApp URL:', socialLinks.whatsapp)||''; saveAll(); renderSocialIcons(); };
      container.appendChild(socialBtn);
    }
    renderSocialIcons();
  }
  function renderSocialIcons() {
    const container = document.getElementById('socialLinksContainer');
    container.innerHTML = '';
    if(socialLinks.facebook) container.innerHTML += `<a href="${socialLinks.facebook}" target="_blank"><i class="fab fa-facebook"></i></a>`;
    if(socialLinks.instagram) container.innerHTML += `<a href="${socialLinks.instagram}" target="_blank"><i class="fab fa-instagram"></i></a>`;
    if(socialLinks.tiktok) container.innerHTML += `<a href="${socialLinks.tiktok}" target="_blank"><i class="fab fa-tiktok"></i></a>`;
    if(socialLinks.whatsapp) container.innerHTML += `<a href="${socialLinks.whatsapp}" target="_blank"><i class="fab fa-whatsapp"></i></a>`;
  }

  // Temas
  document.getElementById('nightModeBtn').onclick = () => { document.body.classList.remove('psychedelic-mode'); document.body.classList.add('night-mode'); };
  document.getElementById('psychModeBtn').onclick = () => { document.body.classList.remove('night-mode'); document.body.classList.add('psychedelic-mode'); };
  document.getElementById('normalModeBtn').onclick = () => { document.body.classList.remove('night-mode','psychedelic-mode'); };

  // Login
  const loginModal = document.getElementById('loginModal');
  document.getElementById('adminLoginBtn').onclick = () => loginModal.classList.add('active');
  document.getElementById('closeLogin').onclick = () => loginModal.classList.remove('active');
  document.getElementById('doLogin').onclick = () => {
    const user = document.getElementById('loginUser').value, pass = document.getElementById('loginPass').value;
    if(user === 'kshaidesign' && pass === 'Valeria2020'){
      authenticated = true; localStorage.setItem('kshai_auth', 'true'); loginModal.classList.remove('active');
      enableAdminMode();
    } else alert('Credenciales incorrectas');
  };
  if(localStorage.getItem('kshai_auth') === 'true') { authenticated = true; enableAdminMode(); }
  function enableAdminMode() {
    const bar = document.createElement('div'); bar.className = 'admin-bar';
    bar.innerHTML = `<span>✏️ Modo edición total</span><button id="resetAllBtn">Restaurar todo</button><button id="logoutBtn">Cerrar sesión</button>`;
    document.body.appendChild(bar);
    document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); location.reload(); };
    document.getElementById('resetAllBtn').onclick = () => { if(confirm('Restaurar datos por defecto?')){ localStorage.clear(); location.reload(); } };
    renderPageNav(); renderPage();
  }
  // Inicial
  renderPageNav();
  renderPage();
  document.querySelector('.close-modal-img').onclick = () => document.getElementById('imageModal').classList.remove('active');
  document.getElementById('imageModal').onclick = (e) => { if(e.target === document.getElementById('imageModal')) document.getElementById('imageModal').classList.remove('active'); };
</script>

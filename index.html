<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kshai Design</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background:#f4efe8;
  color:#3b2416;
}

/* TOP */
.topbar{
  background:#2a1a10;
  color:#fff;
  display:flex;
  justify-content:space-around;
  padding:10px;
  font-size:14px;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:20px;
  background:#fff;
}

/* HERO */
.hero{
  padding:40px;
  text-align:center;
}

.price{
  background:#3b2416;
  color:#fff;
  display:inline-block;
  padding:15px 30px;
  border-radius:30px;
  margin-top:20px;
}

/* CARRUSEL */
.carousel{
  position:relative;
  overflow:hidden;
  padding:20px;
}

.track{
  display:flex;
  transition:.4s;
}

.track img{
  width:220px;
  margin:10px;
  border-radius:10px;
}

.btn-nav{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  background:#3b2416;
  color:#fff;
  border:none;
  padding:10px;
  cursor:pointer;
}

.left{left:10px;}
.right{right:10px;}

/* UPLOAD */
.upload{
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  padding:40px;
}

.box{
  flex:1;
  background:#fff;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:10px 0;
}

button{
  background:#3b2416;
  color:#fff;
  border:none;
  padding:10px 20px;
  border-radius:5px;
  cursor:pointer;
}

.preview img{
  max-width:200px;
}

/* PRODUCTOS */
.products{
  padding:40px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:20px;
}

.card{
  background:#fff;
  padding:10px;
  border-radius:10px;
  text-align:center;
}

/* FOOTER */
footer{
  background:#2a1a10;
  color:#fff;
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<div class="topbar">
  <span>Atención personalizada</span>
  <span>Envíos a todo Chile</span>
  <span>+56949510888</span>
</div>

<nav>
  <h2>Kshai Design</h2>
  <span>Grabado Láser</span>
</nav>

<section class="hero">
  <h1>Personalizamos tus ideas con Grabado y Corte Láser</h1>
  <p>Madera, MDF y más</p>
  <div class="price">Desde $500</div>
</section>

<!-- CARRUSEL -->
<section class="carousel">
  <button class="btn-nav left" onclick="move(-1)">◀</button>
  <div class="track" id="track">
    <img src="https://via.placeholder.com/200">
    <img src="https://via.placeholder.com/200">
    <img src="https://via.placeholder.com/200">
    <img src="https://via.placeholder.com/200">
  </div>
  <button class="btn-nav right" onclick="move(1)">▶</button>
</section>

<!-- SUBIR -->
<section class="upload">

  <div class="box">
    <h3>Sube tu imagen</h3>
    <input type="file" id="file">
  </div>

  <div class="box">
    <h3>Pega link de imagen</h3>
    <input type="text" id="url" placeholder="https://...">
    <button onclick="preview()">Vista previa</button>

    <div class="preview" id="preview"></div>

    <button onclick="send()">Enviar por WhatsApp</button>
  </div>

</section>

<!-- PRODUCTOS -->
<section class="products">
  <h2>Productos destacados</h2>
  <div class="grid">
    <div class="card">Llavero</div>
    <div class="card">Cuadro</div>
    <div class="card">Letrero</div>
  </div>
</section>

<footer>
  <p>© Kshai Design - WhatsApp +56949510888</p>
</footer>

<script>
let pos=0;

function move(dir){
  pos+=dir*220;
  document.getElementById("track").style.transform =
    `translateX(-${pos}px)`;
}

// PREVIEW
function preview(){
  const file=document.getElementById("file").files[0];
  const url=document.getElementById("url").value;
  const preview=document.getElementById("preview");

  preview.innerHTML="";

  if(file){
    const reader=new FileReader();
    reader.onload=e=>{
      preview.innerHTML=`<img src="${e.target.result}">`;
    };
    reader.readAsDataURL(file);
  }else if(url){
    preview.innerHTML=`<img src="${url}">`;
  }
}

// WHATSAPP
function send(){
  const url=document.getElementById("url").value;

  let message="Hola! quiero cotizar un diseño: ";

  if(url){
    message+=url;
  }else{
    message+="(adjunto imagen desde la web)";
  }

  window.open(`https://wa.me/56949510888?text=${encodeURIComponent(message)}`);
}
</script>

</body>
</html>
